<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Слайм — анімації</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0e0d16;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; gap:6px; padding:20px;
  font-family:monospace; color:#557755;
}
canvas { border-radius:10px; display:block; image-rendering:pixelated; }
h2 { font-size:12px; color:#44dd44; letter-spacing:2px; margin-top:4px; }
p  { font-size:10px; letter-spacing:1px; color:#334433; }
</style>
</head>
<body>
<h2>СЛАЙМ · Pixel RPG</h2>
<canvas id="c" width="360" height="200"></canvas>
<p>idle · walk · run · attack</p>

<script>
const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');
const CW   = cvs.width, CH = cvs.height;

// ── Slime palette (same as game) ───────────────────────────────
const _SL = {
  outline:'#091a00',
  body:'#5abf30', bodyHL:'#b8ff70', bodyDark:'#287a05',
  belly:'#88df44',
  slime:'#3aaa10', slimeDark:'#1a6600',
  eye:'#060200', eyeHL:'rgba(255,255,180,0.95)',
  blush:'rgba(200,55,55,0.45)', mouth:'#050d00',
};
const _slEase = p => p*p*(3-2*p);
function _slLine(color,w){ ctx.strokeStyle=color; ctx.lineWidth=w; ctx.lineCap='round'; ctx.lineJoin='round'; }
function _slShape(pathFn,fill,ow=2.6){
  ctx.beginPath(); pathFn();
  ctx.strokeStyle=_SL.outline; ctx.lineWidth=ow; ctx.lineJoin='round'; ctx.stroke();
  ctx.fillStyle=fill; ctx.fill();
}
function _slGloss(pathFn,alpha=0.38){
  ctx.save(); ctx.globalAlpha=alpha; ctx.beginPath(); pathFn();
  ctx.fillStyle=_SL.bodyHL; ctx.fill(); ctx.restore();
}

// ── drawSlug — same logic as game ─────────────────────────────
function drawSlug(ctx_,x,y,t,dir=1,atk={phase:0,t:0},sc=1.0,mode='idle'){
  const p    = atk.t;
  const ease = _slEase;
  const bob  = Math.sin(t*2.2)*0.04;
  const jig  = Math.sin(t*3.7)*0.018;
  let sqX=1, sqY=1, offX=0, offY=0, mouthOpen=0, eyeStr=1, flash=0, blush=0, wobble=0;
  let lean=0, angryBrows=false;

  if(atk.phase===0){
    if(mode==='walk'){
      const ph=t*3.6, hop=Math.max(0,Math.sin(ph)), sqsh=Math.max(0,-Math.sin(ph)*0.55);
      sqX=1+sqsh*0.36-hop*0.08+bob*0.10; sqY=1-sqsh*0.22+hop*0.20; offY=(-hop*8-bob)*sc;
    } else if(mode==='run'){
      const ph=t*6.4, hop=Math.max(0,Math.sin(ph)), sqsh=Math.max(0,-Math.sin(ph)*0.60);
      sqX=1+sqsh*0.52-hop*0.16; sqY=1-sqsh*0.36+hop*0.28; offY=-hop*14*sc;
      lean=0.18; angryBrows=true;
    } else {
      sqX=1+bob*0.45+jig*0.15; sqY=1-bob*0.3; offY=-bob;
    }
  } else if(atk.phase===1){
    const e=ease(p);
    sqX=1+e*0.44; sqY=1-e*0.40; offY=e*2; eyeStr=1-e*0.5;
  } else if(atk.phase===2){
    const e=ease(p); const ext=1-e;
    sqX=1+ext*0.68; sqY=1-ext*0.35; offX=ext*11*sc; mouthOpen=ext*0.95; eyeStr=1+ext*0.4; flash=Math.max(0,1-p*3);
  } else if(atk.phase===3){
    const e=ease(p);
    sqX=1+(1-e)*0.18; sqY=1+(1-e)*0.14; blush=(1-e)*0.95;
    wobble=Math.sin(p*Math.PI*3)*(1-p)*0.14;
  }
  sqX+=wobble; sqY-=wobble*0.6;

  const rX=24*sc*sqX, rY=21*sc*sqY;
  const cx=offX, cy=-rY-offY*sc;

  ctx_.save(); ctx_.translate(x,y); ctx_.scale(dir,1);
  if(lean) ctx_.rotate(lean);

  // Drop shadow
  ctx_.save(); ctx_.globalAlpha=0.15;
  ctx_.beginPath(); ctx_.ellipse(cx*0.4,-1,rX*0.75,4*sc,0,0,Math.PI*2);
  ctx_.fillStyle=_SL.bodyDark; ctx_.fill(); ctx_.restore();

  // Body
  _slShape(()=>{ ctx.ellipse(cx,cy,rX,rY,0,0,Math.PI*2); },_SL.body,2.6);

  // Flash on strike
  if(flash>0.02){
    ctx_.save(); ctx_.globalAlpha=flash*0.55;
    ctx_.beginPath(); ctx_.ellipse(cx,cy,rX,rY,0,0,Math.PI*2);
    ctx_.fillStyle='#ccff44'; ctx_.fill(); ctx_.restore();
  }

  // Belly highlight
  ctx_.save(); ctx_.globalAlpha=0.28;
  ctx_.beginPath(); ctx_.ellipse(cx,cy+rY*0.25,rX*0.70,rY*0.44,0,0,Math.PI*2);
  ctx_.fillStyle=_SL.belly; ctx_.fill(); ctx_.restore();

  // Gloss
  _slGloss(()=>{ ctx.ellipse(cx-rX*0.18,cy-rY*0.33,rX*0.38,rY*0.30,-0.3,0,Math.PI*2); },0.52);
  _slGloss(()=>{ ctx.ellipse(cx+rX*0.26,cy-rY*0.52,rX*0.11,rY*0.11,0,0,Math.PI*2); },0.38);

  // Eyes
  const eyeSep=rX*0.28, eyeY=cy-rY*0.10, eyeR=rX*0.10;
  // Angry brows (run mode)
  if(angryBrows){
    ctx_.save(); ctx_.strokeStyle=_SL.outline; ctx_.lineWidth=1.6; ctx_.lineCap='round';
    for(let s=-1;s<=1;s+=2){
      const ex=cx+s*eyeSep;
      ctx_.beginPath();
      ctx_.moveTo(ex-eyeR*1.0, eyeY-eyeR*1.5-eyeR*s*0.5);
      ctx_.lineTo(ex+eyeR*1.0, eyeY-eyeR*1.5+eyeR*s*0.5);
      ctx_.stroke();
    }
    ctx_.restore();
  }
  for(const e of [{x:cx-eyeSep},{x:cx+eyeSep}]){
    ctx_.beginPath(); ctx_.arc(e.x,eyeY,eyeR*eyeStr,0,Math.PI*2);
    ctx_.fillStyle=_SL.eye; ctx_.fill();
    ctx_.save(); ctx_.globalAlpha=0.90;
    ctx_.beginPath(); ctx_.arc(e.x-eyeR*0.30,eyeY-eyeR*0.30,eyeR*0.28,0,Math.PI*2);
    ctx_.fillStyle=_SL.eyeHL; ctx_.fill(); ctx_.restore();
  }

  // Blush (post-attack)
  if(blush>0.05){
    ctx_.save(); ctx_.globalAlpha=blush*0.5;
    for(let s=-1;s<=1;s+=2){
      ctx_.beginPath(); ctx_.ellipse(cx+s*eyeSep*1.65,eyeY+eyeR*0.95,eyeR*0.60,eyeR*0.22,0,0,Math.PI*2);
      ctx_.fillStyle=_SL.blush; ctx_.fill();
    }
    ctx_.restore();
  }

  // Mouth
  const mouthX=cx, mouthY=eyeY+eyeR+rY*0.18;
  ctx_.save(); ctx_.globalAlpha=0.28+mouthOpen*0.45;
  const mw=rX*(0.14+mouthOpen*0.18);
  ctx_.beginPath();
  ctx_.moveTo(mouthX-mw,mouthY);
  ctx_.quadraticCurveTo(mouthX,mouthY+rY*(0.04+mouthOpen*0.12),mouthX+mw,mouthY);
  _slLine(_SL.mouth,1.2*sc); ctx_.stroke();
  ctx_.restore();

  ctx_.restore();
}

// ── Attack state machine ───────────────────────────────────────
const ATK_DUR  = [0, 0.38, 0.28, 0.50]; // seconds per phase
const ATK_WAIT = 2.8;
let atkPhase=0, atkP=0, atkWait=0;

function tickAtk(dt){
  if(atkPhase===0){
    atkWait += dt;
    if(atkWait >= ATK_WAIT){ atkPhase=1; atkP=0; atkWait=0; }
  } else {
    atkP += dt / ATK_DUR[atkPhase];
    if(atkP >= 1){ atkP=0; atkPhase = atkPhase>=3 ? 0 : atkPhase+1; }
  }
}

// ── Layout ────────────────────────────────────────────────────
const SLOTS = [
  { x:45,  mode:'idle', label:'idle'   },
  { x:135, mode:'walk', label:'ходьба' },
  { x:225, mode:'run',  label:'агро'   },
  { x:315, mode:'atk',  label:'атака'  },
];
const GY = 152; // ground y

// ── Render loop ───────────────────────────────────────────────
let t0=null, tPrev=0;
function frame(ts){
  if(!t0){ t0=ts; tPrev=ts; }
  const t  = (ts-t0)/1000;
  const dt = Math.min((ts-tPrev)/1000, 0.05);
  tPrev = ts;
  tickAtk(dt);

  ctx.clearRect(0,0,CW,CH);

  // Background
  ctx.fillStyle='#0e0d16'; ctx.fillRect(0,0,CW,CH);

  // Stone floor
  ctx.fillStyle='#1a1828'; ctx.fillRect(0,GY,CW,CH-GY);
  ctx.fillStyle='#22203a';
  for(let tx=0; tx<CW; tx+=32){
    ctx.fillRect(tx,   GY+1,31,16);
    ctx.fillRect(tx+16,GY+18,31,16);
  }
  ctx.fillStyle='#3a3858'; ctx.fillRect(0,GY,CW,2);

  // Slot dividers
  ctx.strokeStyle='#1e1c2e'; ctx.lineWidth=1;
  for(let i=1;i<4;i++){
    ctx.beginPath(); ctx.moveTo(i*90,4); ctx.lineTo(i*90,GY-4); ctx.stroke();
  }

  const atkState = { phase:atkPhase, t:atkP };
  for(const s of SLOTS){
    const atk = s.mode==='atk' ? atkState : {phase:0,t:0};
    const mode = s.mode==='atk' ? 'idle' : s.mode;
    drawSlug(ctx, s.x, GY, t, 1, atk, 1.0, mode);

    ctx.fillStyle='#334433'; ctx.font='9px monospace'; ctx.textAlign='center';
    ctx.fillText(s.label, s.x, GY+34);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
