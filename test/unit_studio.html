<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<title>Unit Studio — Dungeon Lord</title>
<style>
  html, body { margin: 0; min-height: 100%; background: #1a1230; }
  body { display: grid; place-items: center; padding: 20px; font-family: system-ui, sans-serif; color: #ddd; box-sizing: border-box; }
  .studio { display: flex; flex-direction: column; align-items: center; gap: 16px; max-width: 900px; }
  .studio h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; margin: 0; opacity: 0.9; }
  header { display: flex; gap: 16px; align-items: center; padding: 8px 0; }
  .row { display: flex; gap: 24px; align-items: flex-end; }
  .frame { background: #2a1a4a; border: 1px solid #3d2a66; display: block; overflow: hidden; }
  .label { font-size: 12px; opacity: 0.7; text-align: center; margin-top: 6px; }
  .tiny { image-rendering: crisp-edges; }

  .passive { font-size: 12px; opacity: 0.7; font-style: italic; min-height: 16px; }
  .passive .tier { color: #e0b060; font-style: normal; font-weight: 600; letter-spacing: 0.05em; }

  select, button {
    background: #2a1a4a; color: #ddd; border: 1px solid #3d2a66;
    padding: 8px 14px; font: inherit; cursor: pointer; border-radius: 4px;
    transition: background 0.15s;
  }
  select { min-width: 180px; }
  button:hover, select:hover { background: #3d2a66; }
  button.active { background: #5a3a8a; border-color: #8a6aaa; }

  .controls { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
  .controls .sep { width: 1px; background: #3d2a66; margin: 0 4px; }

  /* ========== TRANSFORM BOX ========== */
  .recruit-svg .traveler,
  .recruit-svg .facer,
  .recruit-svg .recruit-root,
  .recruit-svg .torso,
  .recruit-svg .foot-l,
  .recruit-svg .foot-r,
  .recruit-svg .sword-arm,
  .recruit-svg .shield-arm {
    transform-box: view-box;
  }

  /* ========== FACING ========== */
  .recruit-svg .facer {
    transform-origin: 50px 55px;
    transform: scaleX(1);
    transition: transform 0.38s cubic-bezier(0.55, 0, 0.45, 1);
  }
  .recruit-svg.facing-left .facer { transform: scaleX(-1); }

  /* ========== TRAVELER ========== */
  .recruit-svg .traveler { transform-origin: 50px 55px; }
  .recruit-svg.state-walk .traveler { animation: travel 3.4s linear infinite; }
  .recruit-svg.state-run  .traveler { animation: travel 1.3s linear infinite; }
  .recruit-svg.facing-left.state-walk .traveler,
  .recruit-svg.facing-left.state-run  .traveler { animation-direction: reverse; }
  @keyframes travel {
    from { transform: translateX(-55px); }
    to   { transform: translateX(55px); }
  }

  /* ========== IDLE ========== */
  .recruit-svg .torso {
    transform-origin: 50px 88px;
    animation: idle-bob 2.6s ease-in-out infinite;
  }
  @keyframes idle-bob {
    0%, 100% { transform: translateY(0) scale(1, 1); }
    50%      { transform: translateY(-0.6px) scale(1.01, 0.99); }
  }

  /* ========== WALK ========== */
  .state-walk .torso { animation: walk-bob 0.6s ease-in-out infinite; }
  @keyframes walk-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-1.4px) rotate(-1.2deg); }
    75%      { transform: translateY(-1.4px) rotate(1.2deg); }
  }
  .state-walk .foot-l { transform-origin: 40px 88px; animation: foot-l-walk 0.6s ease-in-out infinite; }
  .state-walk .foot-r { transform-origin: 60px 88px; animation: foot-r-walk 0.6s ease-in-out infinite; }
  @keyframes foot-l-walk {
    0%, 100% { transform: translate(0, 0); }
    25%      { transform: translate(-2.5px, -3px); }
    50%      { transform: translate(-3.5px, 0); }
  }
  @keyframes foot-r-walk {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(2.5px, 0); }
    75%      { transform: translate(3.5px, -3px); }
  }
  .state-walk .sword-arm { transform-origin: 78px 55px; animation: sword-walk 0.6s ease-in-out infinite; }
  @keyframes sword-walk {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(-7deg); }
    75%      { transform: rotate(7deg); }
  }
  .state-walk .shield-arm { transform-origin: 22px 55px; animation: shield-walk 0.6s ease-in-out infinite; }
  @keyframes shield-walk {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(6deg); }
    75%      { transform: rotate(-6deg); }
  }

  /* ========== RUN ========== */
  .state-run .torso { animation: run-bob 0.32s ease-in-out infinite; }
  @keyframes run-bob {
    0%, 100% { transform: translateY(0) rotate(4deg); }
    50%      { transform: translateY(-3.2px) rotate(6deg); }
  }
  .state-run .foot-l { transform-origin: 40px 88px; animation: foot-l-run 0.32s ease-in-out infinite; }
  .state-run .foot-r { transform-origin: 60px 88px; animation: foot-r-run 0.32s ease-in-out infinite; }
  @keyframes foot-l-run {
    0%, 100% { transform: translate(-1px, 0); }
    25%      { transform: translate(-5px, -6px) rotate(-10deg); }
    50%      { transform: translate(-6px, 0) rotate(0deg); }
  }
  @keyframes foot-r-run {
    0%, 100% { transform: translate(1px, 0); }
    50%      { transform: translate(5px, 0) rotate(0deg); }
    75%      { transform: translate(6px, -6px) rotate(10deg); }
  }
  .state-run .sword-arm { transform-origin: 78px 55px; animation: sword-run 0.32s ease-in-out infinite; }
  @keyframes sword-run {
    0%, 100% { transform: rotate(-8deg); }
    50%      { transform: rotate(-22deg); }
  }
  .state-run .shield-arm { transform-origin: 22px 55px; animation: shield-run 0.32s ease-in-out infinite; }
  @keyframes shield-run {
    0%, 100% { transform: rotate(10deg); }
    50%      { transform: rotate(18deg); }
  }

  /* ========== ATTACK ========== */
  .state-attack .torso { animation: attack-lean 0.8s ease-in-out infinite; }
  @keyframes attack-lean {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    22%      { transform: translateY(0.5px) rotate(-5deg); }
    44%      { transform: translateY(-1px) rotate(7deg); }
    70%      { transform: translateY(0) rotate(2deg); }
  }
  .state-attack .sword-arm { transform-origin: 80px 60px; animation: sword-attack 0.8s cubic-bezier(.5,.1,.3,1.6) infinite; }
  @keyframes sword-attack {
    0%, 100% { transform: rotate(0deg); }
    22%      { transform: rotate(-75deg); }
    44%      { transform: rotate(80deg); }
    70%      { transform: rotate(25deg); }
  }
  .state-attack .shield-arm { transform-origin: 22px 55px; animation: shield-attack 0.8s ease-in-out infinite; }
  @keyframes shield-attack {
    0%, 100% { transform: rotate(0deg) translate(0, 0); }
    22%      { transform: rotate(-15deg) translate(1px, -2px); }
    44%      { transform: rotate(-8deg) translate(3px, -3px); }
  }
  .state-attack .foot-l { transform-origin: 40px 88px; animation: foot-attack-l 0.8s ease-in-out infinite; }
  .state-attack .foot-r { transform-origin: 60px 88px; animation: foot-attack-r 0.8s ease-in-out infinite; }
  @keyframes foot-attack-l {
    0%, 100% { transform: translate(0, 0); }
    44%      { transform: translate(-1.5px, -1px); }
  }
  @keyframes foot-attack-r {
    0%, 100% { transform: translate(0, 0); }
    22%      { transform: translate(1px, -1px); }
    44%      { transform: translate(2px, 0); }
  }

  /* ========== ATTACK — SCOUT I (штиковий випад, без обертання) ========== */
  .recruit-svg.unit-scout.state-attack .torso {
    animation: scout-lunge 0.5s cubic-bezier(.4,.05,.3,1.3) infinite;
  }
  @keyframes scout-lunge {
    0%, 100% { transform: translate(0, 0); }
    15%      { transform: translate(-2.5px, 0); }
    45%      { transform: translate(6px, -0.5px); }
    65%      { transform: translate(5px, 0); }
  }
  .recruit-svg.unit-scout.state-attack .sword-arm {
    transform-origin: 78px 55px;
    animation: scout-stab 0.5s cubic-bezier(.35,.05,.2,1.9) infinite;
  }
  @keyframes scout-stab {
    0%, 100% { transform: translate(0, 0); }
    15%      { transform: translate(-5px, 0); }
    45%      { transform: translate(12px, 0); }
    65%      { transform: translate(8px, 0); }
  }
  .recruit-svg.unit-scout.state-attack .shield-arm {
    transform-origin: 22px 55px;
    animation: scout-guard 0.5s ease-in-out infinite;
  }
  @keyframes scout-guard {
    0%, 100% { transform: translate(0, 0); }
    45%      { transform: translate(2px, -1px); }
  }
  .recruit-svg.unit-scout.state-attack .foot-l { animation: scout-foot-l 0.5s ease-in-out infinite; }
  .recruit-svg.unit-scout.state-attack .foot-r { animation: scout-foot-r 0.5s ease-in-out infinite; }
  @keyframes scout-foot-l {
    0%, 100% { transform: translate(0, 0); }
    45%      { transform: translate(-2px, 0); }
  }
  @keyframes scout-foot-r {
    0%, 100% { transform: translate(0, 0); }
    45%      { transform: translate(5px, -0.5px); }
  }

  /* ========== ATTACK — MAGE I/II (каст з посоха) ========== */
  .recruit-svg.unit-mage.state-attack .torso,
  .recruit-svg.unit-mage2.state-attack .torso {
    animation: mage-cast-body 1.2s ease-in-out infinite;
  }
  @keyframes mage-cast-body {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    35%      { transform: translate(0, -1px) rotate(-3deg); }   /* підняття */
    65%      { transform: translate(1px, 0) rotate(2deg); }     /* викид вперед */
  }
  .recruit-svg.unit-mage.state-attack .sword-arm,
  .recruit-svg.unit-mage2.state-attack .sword-arm {
    transform-origin: 78px 55px;
    animation: mage-cast-staff 1.2s ease-in-out infinite;
  }
  @keyframes mage-cast-staff {
    0%, 100% { transform: rotate(0deg) translate(0, 0); }
    35%      { transform: rotate(-25deg) translate(0, -3px); }    /* посох вгору */
    50%      { transform: rotate(-30deg) translate(0, -3px); }    /* пік */
    65%      { transform: rotate(15deg) translate(2px, 1px); }     /* кидок вперед */
    80%      { transform: rotate(5deg) translate(0, 0); }
  }
  .recruit-svg.unit-mage.state-attack .shield-arm,
  .recruit-svg.unit-mage2.state-attack .shield-arm {
    transform-origin: 22px 55px;
    animation: mage-cast-off 1.2s ease-in-out infinite;
  }
  @keyframes mage-cast-off {
    0%, 100% { transform: rotate(0deg) translate(0, 0); }
    50%      { transform: rotate(15deg) translate(2px, -2px); }
  }
  .recruit-svg.unit-mage.state-attack .spell-orb,
  .recruit-svg.unit-mage2.state-attack .spell-orb {
    transform-origin: 78px 25px;
    animation: spell-orb-cast 1.2s ease-in-out infinite;
  }
  @keyframes spell-orb-cast {
    0%, 30%   { opacity: 0; transform: scale(0.2); }
    50%       { opacity: 1; transform: scale(1.3); }
    65%       { opacity: 1; transform: scale(1.5) translate(8px, 5px); }
    75%, 100% { opacity: 0; transform: scale(0.4) translate(20px, 12px); }
  }

  /* ========== ATTACK — NECRO I/II (каст темної магії, обома руками) ========== */
  .recruit-svg.unit-necro.state-attack .torso,
  .recruit-svg.unit-necro2.state-attack .torso {
    animation: necro-cast-body 1.4s ease-in-out infinite;
  }
  @keyframes necro-cast-body {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    30%      { transform: translate(0, -1px) rotate(-3deg); }
    60%      { transform: translate(2px, 0) rotate(4deg); }
  }
  .recruit-svg.unit-necro.state-attack .sword-arm,
  .recruit-svg.unit-necro2.state-attack .sword-arm {
    transform-origin: 78px 55px;
    animation: necro-staff 1.4s ease-in-out infinite;
  }
  @keyframes necro-staff {
    0%, 100% { transform: rotate(0deg); }
    30%      { transform: rotate(-20deg) translate(0, -2px); }
    60%      { transform: rotate(20deg) translate(2px, 0); }
  }
  .recruit-svg.unit-necro.state-attack .shield-arm,
  .recruit-svg.unit-necro2.state-attack .shield-arm {
    transform-origin: 22px 55px;
    animation: necro-hand 1.4s ease-in-out infinite;
  }
  @keyframes necro-hand {
    0%, 100% { transform: rotate(0deg); }
    30%      { transform: rotate(20deg) translate(0, -2px); }
    60%      { transform: rotate(-20deg) translate(-2px, 0); }
  }
  .recruit-svg.unit-necro.state-attack .spell-orb,
  .recruit-svg.unit-necro2.state-attack .spell-orb {
    transform-origin: 78px 25px;
    animation: necro-orb 1.4s ease-in-out infinite;
  }
  @keyframes necro-orb {
    0%, 25%   { opacity: 0; transform: scale(0.2); }
    50%       { opacity: 1; transform: scale(1.4); }
    65%       { opacity: 1; transform: scale(1.6) translate(8px, 8px); }
    80%, 100% { opacity: 0; transform: scale(0.5) translate(22px, 18px); }
  }

  /* ========== ATTACK — BERSERKER (швидкий широкий розмах) ========== */
  .recruit-svg.unit-berserker.state-attack .torso,
  .recruit-svg.unit-berserker2.state-attack .torso {
    animation: berserker-lunge 0.55s ease-in-out infinite;
  }
  @keyframes berserker-lunge {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    20%      { transform: translate(-3px, 0) rotate(-10deg); }
    50%      { transform: translate(4px, -1px) rotate(12deg); }
    75%      { transform: translate(2px, 0) rotate(5deg); }
  }
  .recruit-svg.unit-berserker.state-attack .sword-arm,
  .recruit-svg.unit-berserker2.state-attack .sword-arm {
    transform-origin: 78px 55px;
    animation: berserker-axe 0.55s cubic-bezier(.4,.05,.3,1.7) infinite;
  }
  @keyframes berserker-axe {
    0%, 100% { transform: rotate(0deg); }
    20%      { transform: rotate(-100deg); }
    50%      { transform: rotate(110deg); }
    75%      { transform: rotate(40deg); }
  }
  .recruit-svg.unit-berserker.state-attack .shield-arm,
  .recruit-svg.unit-berserker2.state-attack .shield-arm {
    transform-origin: 22px 55px;
    animation: berserker-off-axe 0.55s cubic-bezier(.4,.05,.3,1.7) infinite;
  }
  @keyframes berserker-off-axe {
    0%, 100% { transform: rotate(0deg); }
    20%      { transform: rotate(100deg); }
    50%      { transform: rotate(-110deg); }
    75%      { transform: rotate(-40deg); }
  }

  /* ========== ATTACK — CHAMPION (важкий двуручний удар) ========== */
  .recruit-svg.unit-champion.state-attack .torso,
  .recruit-svg.unit-champion2.state-attack .torso {
    animation: champion-overhead 1.2s ease-in-out infinite;
  }
  @keyframes champion-overhead {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    30%      { transform: translate(-2px, -1px) rotate(-6deg); }
    55%      { transform: translate(4px, 0) rotate(10deg); }
    75%      { transform: translate(3px, 0) rotate(7deg); }
  }
  .recruit-svg.unit-champion.state-attack .sword-arm,
  .recruit-svg.unit-champion2.state-attack .sword-arm {
    transform-origin: 78px 55px;
    animation: champion-greatsword 1.2s cubic-bezier(.4,.05,.3,1.6) infinite;
  }
  @keyframes champion-greatsword {
    0%, 100% { transform: rotate(0deg); }
    30%      { transform: rotate(-90deg) translate(-2px, -2px); }
    55%      { transform: rotate(95deg) translate(2px, 0); }
    75%      { transform: rotate(35deg); }
  }
  .recruit-svg.unit-champion.state-attack .shield-arm,
  .recruit-svg.unit-champion2.state-attack .shield-arm {
    transform-origin: 22px 55px;
    animation: champion-offhand 1.2s ease-in-out infinite;
  }
  @keyframes champion-offhand {
    0%, 100% { transform: rotate(0deg); }
    30%      { transform: rotate(-30deg) translate(2px, -2px); }
    55%      { transform: rotate(30deg) translate(4px, 0); }
  }

  /* ========== ATTACK — ARCHER I (натяг + випуск стріли) ========== */
  .recruit-svg.unit-archer.state-attack .torso {
    animation: archer-stance 1.1s ease-in-out infinite;
  }
  @keyframes archer-stance {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    35%      { transform: translate(-1px, 0) rotate(-2deg); }   /* натяг — корпус трохи назад */
    62%      { transform: translate(-1px, 0) rotate(-2deg); }   /* утримання */
    72%      { transform: translate(1.5px, 0) rotate(1deg); }    /* recoil */
  }
  .recruit-svg.unit-archer.state-attack .shield-arm {
    transform-origin: 22px 55px;
    animation: archer-bow 1.1s ease-in-out infinite;
  }
  @keyframes archer-bow {
    0%, 100% { transform: rotate(0deg) translate(0, 0); }
    25%      { transform: rotate(-2deg) translate(0.5px, 0); }   /* лук стабільний */
    65%      { transform: rotate(-3deg) translate(1px, 0); }
    72%      { transform: rotate(2deg) translate(-1px, 0); }     /* recoil після пострілу */
  }
  .recruit-svg.unit-archer.state-attack .sword-arm {
    transform-origin: 78px 55px;
    animation: archer-draw 1.1s cubic-bezier(.4,.05,.5,1) infinite;
  }
  @keyframes archer-draw {
    0%      { transform: translate(0, 0); }
    35%     { transform: translate(-13px, -1px); }   /* натяг тятиви до щоки */
    62%     { transform: translate(-15px, -1px); }   /* доводимо до повного натягу */
    68%     { transform: translate(-15px, -1px); }   /* момент пострілу */
    72%     { transform: translate(2px, 0); }        /* recoil руки вперед після пострілу */
    100%    { transform: translate(0, 0); }
  }
  .recruit-svg.unit-archer.state-attack .foot-l { animation: archer-foot-l 1.1s ease-in-out infinite; }
  .recruit-svg.unit-archer.state-attack .foot-r { animation: archer-foot-r 1.1s ease-in-out infinite; }
  @keyframes archer-foot-l {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(-0.5px, 0); }
  }
  @keyframes archer-foot-r {
    0%, 100% { transform: translate(0, 0); }
    50%      { transform: translate(0.5px, 0); }
  }
  /* стріла з'являється під час натягу і "вилітає" при recoil */
  .recruit-svg.unit-archer.state-attack .arrow-nocked {
    animation: archer-arrow 1.1s linear infinite;
  }
  @keyframes archer-arrow {
    0%, 70%   { opacity: 1; transform: translate(0, 0); }
    71%       { opacity: 1; transform: translate(0, 0); }
    72%, 100% { opacity: 0; transform: translate(20px, 0); }
  }

  /* ========== ATTACK — ARCHER II (швидкі двa постріли) ========== */
  .recruit-svg.unit-archer2.state-attack .torso {
    animation: archer2-stance 1s ease-in-out infinite;
  }
  @keyframes archer2-stance {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    20%      { transform: translate(-1px, 0) rotate(-2deg); }
    32%      { transform: translate(0.5px, 0) rotate(0deg); }
    60%      { transform: translate(-1px, 0) rotate(-2deg); }
    72%      { transform: translate(1px, 0) rotate(1deg); }
  }
  .recruit-svg.unit-archer2.state-attack .shield-arm {
    transform-origin: 22px 55px;
    animation: archer2-bow 1s ease-in-out infinite;
  }
  @keyframes archer2-bow {
    0%, 100% { transform: rotate(0deg) translate(0, 0); }
    20%      { transform: rotate(-3deg) translate(0.5px, 0); }
    32%      { transform: rotate(2deg) translate(-1px, 0); }
    60%      { transform: rotate(-3deg) translate(0.5px, 0); }
    72%      { transform: rotate(2deg) translate(-1px, 0); }
  }
  .recruit-svg.unit-archer2.state-attack .sword-arm {
    transform-origin: 78px 55px;
    animation: archer2-draw 1s cubic-bezier(.4,.05,.5,1) infinite;
  }
  @keyframes archer2-draw {
    0%      { transform: translate(0, 0); }
    20%     { transform: translate(-15px, -1px); }   /* перший натяг */
    30%     { transform: translate(-15px, -1px); }
    32%     { transform: translate(2px, 0); }        /* перший recoil */
    45%     { transform: translate(0, 0); }
    60%     { transform: translate(-15px, -1px); }   /* другий натяг */
    70%     { transform: translate(-15px, -1px); }
    72%     { transform: translate(2px, 0); }        /* другий recoil */
    100%    { transform: translate(0, 0); }
  }
  .recruit-svg.unit-archer2.state-attack .arrow-nocked {
    animation: archer2-arrow 1s linear infinite;
  }
  @keyframes archer2-arrow {
    0%, 31%   { opacity: 1; transform: translate(0, 0); }
    32%, 44%  { opacity: 0; transform: translate(20px, 0); }
    45%, 71%  { opacity: 1; transform: translate(0, 0); }
    72%, 100% { opacity: 0; transform: translate(20px, 0); }
  }
  .recruit-svg.unit-archer2.state-attack .foot-l { animation: archer-foot-l 1s ease-in-out infinite; }
  .recruit-svg.unit-archer2.state-attack .foot-r { animation: archer-foot-r 1s ease-in-out infinite; }

  /* ========== ATTACK — SCOUT II (alternating jab-jab вперед) ========== */
  .recruit-svg.unit-scout2.state-attack .torso {
    animation: scout2-lunge 0.78s ease-in-out infinite;
  }
  @keyframes scout2-lunge {
    0%, 100% { transform: translate(0, 0); }
    10%      { transform: translate(-1.5px, 0); }
    28%      { transform: translate(4.5px, -0.5px); }   /* супровід правого jab */
    50%      { transform: translate(0.5px, 0); }
    60%      { transform: translate(-1px, 0); }
    78%      { transform: translate(3.5px, -0.5px); }   /* супровід лівого jab */
    92%      { transform: translate(1px, 0); }
  }
  .recruit-svg.unit-scout2.state-attack .sword-arm {

<script>
  const UNITS = {
    recruit:   { label: 'Рекрут I',   passive: 'Без пасиву' },
    recruit2:  { label: 'Рекрут II',  passive: '<span class="tier">II</span> Hardened — +3 броні' },
    soldier:   { label: 'Солдат I',   passive: 'Без пасиву' },
    soldier2:  { label: 'Солдат II',  passive: '<span class="tier">II</span> Veteran — (пасивка TBD)' },
    scout:     { label: 'Розвідник I', passive: 'Без пасиву' },
    scout2:    { label: 'Розвідник II', passive: '<span class="tier">II</span> Eagle Eye — +20% критичного шансу' },
    archer:    { label: 'Лучник I', passive: 'Без пасиву' },
    archer2:   { label: 'Лучник II', passive: '<span class="tier">II</span> Volley — швидкі 2 постріли поспіль' },
    knight:    { label: 'Лицар I', passive: 'Без пасиву' },
    knight2:   { label: 'Лицар II', passive: '<span class="tier">II</span> Guardian — 20% шанс блоку щитом' },
    mage:      { label: 'Маг I', passive: 'Без пасиву' },
    mage2:     { label: 'Маг II', passive: '<span class="tier">II</span> Arcane Burst — сплеск уражує 2 цілі' },
    berserker: { label: 'Берсерк I', passive: 'Без пасиву' },
    berserker2:{ label: 'Берсерк II', passive: '<span class="tier">II</span> Rage — +30% атаки при HP < 50%' },
    paladin:   { label: 'Паладін I', passive: 'Без пасиву' },
    paladin2:  { label: 'Паладін II', passive: '<span class="tier">II</span> Blessing — аура +2 броні союзникам' },
    necro:     { label: 'Некромант I', passive: 'Без пасиву' },
    necro2:    { label: 'Некромант II', passive: '<span class="tier">II</span> Soul Harvest — відновлення HP при вбивстві' },
    champion:  { label: 'Чемпіон I', passive: 'Без пасиву' },
    champion2: { label: 'Чемпіон II', passive: '<span class="tier">II</span> Sovereign — +15% до всіх статів загону' },
  };

  const select    = document.getElementById('unitSelect');
  const targets   = document.querySelectorAll('.recruit-svg');
  const passiveEl = document.getElementById('passiveLabel');

  function renderUnit(id) {
    const src = document.querySelector(`#unit-${id} > .traveler`);
    if (!src) return;
    targets.forEach(svg => {
      svg.querySelectorAll('.traveler').forEach(el => el.remove());
      Array.from(svg.classList).forEach(cls => {
        if (cls.startsWith('unit-')) svg.classList.remove(cls);
      });
      svg.classList.add('unit-' + id);
      svg.appendChild(src.cloneNode(true));
    });
    passiveEl.innerHTML = UNITS[id].passive;
  }

  select.addEventListener('change', () => renderUnit(select.value));

  // ---- state / facing controls (ідентично як у recruit_lvl2) ----
  const stateButtons = document.querySelectorAll('button[data-state]');
  const turnBtn = document.getElementById('turnBtn');
  const allStates = ['walk', 'run', 'attack'];
  let facingLeft = false;

  function setState(state) {
    targets.forEach(svg => {
      allStates.forEach(s => svg.classList.remove('state-' + s));
      if (state !== 'idle') svg.classList.add('state-' + state);
    });
    stateButtons.forEach(b => b.classList.toggle('active', b.dataset.state === state));
  }

  function toggleFacing() {
    facingLeft = !facingLeft;
    targets.forEach(svg => svg.classList.toggle('facing-left', facingLeft));
    turnBtn.textContent = facingLeft ? '⇄ поворот (←)' : '⇄ поворот (→)';
  }

  stateButtons.forEach(b => b.addEventListener('click', () => setState(b.dataset.state)));
  turnBtn.addEventListener('click', toggleFacing);

  // initial render
  renderUnit(select.value);
</script>
