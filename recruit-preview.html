<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Рекрут — Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0f0d18;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
}
h1 { color: #d4a030; font-size: 20px; letter-spacing: 3px; margin-bottom: 14px; text-transform: uppercase; }
canvas { border: 1px solid #2a2038; border-radius: 10px; box-shadow: 0 0 40px rgba(80,40,160,0.3); }
.labels { display: flex; width: 720px; margin-top: 10px; color: #887799; font-size: 13px; }
.labels div { flex: 1; text-align: center; }
</style>
</head>
<body>
<h1>⚔ Рекрут</h1>
<canvas id="c" width="720" height="300"></canvas>
<div class="labels">
  <div>🚶 Ходьба</div>
  <div>🏃 Біг</div>
  <div>⚔ Атака</div>
</div>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Helpers ───────────────────────────────────────────────────────────────────
const _e  = p => p*p*(3-2*p);
const _lp = (a,b,f) => a + (b-a)*f;

function bE(ox, oy, a, len) {
    return [ox + Math.sin(a)*len, oy + Math.cos(a)*len];
}

function drawLimb(c, x1,y1, x2,y2, w1,w2, col) {
    const dx=x2-x1, dy=y2-y1;
    const len = Math.hypot(dx,dy);
    if (len < 0.01) return;
    c.save();
    c.translate(x1,y1);
    c.rotate(Math.atan2(dx,dy));
    c.fillStyle = col;
    c.beginPath();
    c.moveTo(-w1/2, 0); c.lineTo(w1/2, 0);
    c.lineTo( w2/2, len); c.lineTo(-w2/2, len);
    c.closePath(); c.fill();
    c.restore();
}

function jnt(c, jx,jy, r, col) {
    c.fillStyle=col; c.beginPath(); c.arc(jx,jy,r,0,Math.PI*2); c.fill();
}

// ── Colors ────────────────────────────────────────────────────────────────────
const C = {
    armorMid:  '#7e8fa4',
    armorDark: '#3e4f5e',
    armorHi:   '#9bb0c4',
    cloak:     '#7a1520',
    cloakDark: '#4a0c10',
    skin:      '#c49868',
    boot:      '#251d0f',
    shield:    '#8a1020',
    shBord:    '#c84040',
    plume:     '#cc2030',
    plume2:    '#cc6020',
};

// ── drawRecruit ───────────────────────────────────────────────────────────────
// x,y  = floor contact point
// dir  = 1 (right) | -1 (left)   — scale handles mirroring
// sc   = pixel scale
// atk  = attack progress 0..1
// running = bool
function drawRecruit(c, x, y, t, dir, sc, atk, running) {
    const spd  = running ? 3.2 : 2.4;
    const wc   = Math.sin(t * spd);
    const wc_c = Math.cos(t * spd);
    const bob  = running ? (1-Math.abs(wc))*4.5 : (1-Math.abs(wc))*2.8;
    const lean = running ? 0.12 : 0.04;

    // Leg swing (fades out during attack)
    const ap = atk || 0;
    const legFade = ap > 0 ? Math.max(0, 1 - ap*4) : 1;
    const lgS  = (running ? 0.62 : 0.48) * legFade;
    const legF = wc * lgS,  legB = -legF;
    const knF  = 0.12 + Math.max(0, wc_c)  * (running ? 0.88 : 0.68) * legFade;
    const knB  = 0.12 + Math.max(0,-wc_c)  * (running ? 0.88 : 0.68) * legFade;

    // Arm swing base
    const arS = (running ? 0.44 : 0.30) * legFade;
    let swA  = -wc * arS,  swEl = 0.15 + Math.max(0,-wc_c)*0.38;  // sword arm
    let shA  =  wc * arS,  shEl = 0.15 + Math.max(0, wc_c)*0.42;  // shield arm
    let atkT = 0;

    // Attack override (no *dir — scale() handles mirroring)
    if (ap > 0) {
        if (ap < 0.22) {
            const f=_e(ap/0.22);
            swA  = _lp(-wc*arS,  -0.88, f); swEl = _lp(swEl, 0.22, f);
            shA  = _lp( wc*arS,  -0.18, f); shEl = _lp(shEl, 0.62, f);
            atkT = _lp(0, -0.14, f);
        } else if (ap < 0.46) {
            const f=_e((ap-0.22)/0.24);
            swA  = _lp(-0.88, 1.28, f); swEl = _lp(0.22, 0.90, f);
            shA  = _lp(-0.18,-0.45, f); shEl = _lp(0.62, 0.82, f);
            atkT = _lp(-0.14, 0.24, f);
        } else if (ap < 0.65) {
            const f=_e((ap-0.46)/0.19);
            swA  = _lp(1.28, 0.80, f); swEl = _lp(0.90, 0.44, f);
            atkT = _lp(0.24, 0.09, f);
        } else {
            const f=_e((ap-0.65)/0.35);
            swA  = _lp(0.80, -wc*arS, f); swEl = _lp(0.44, 0.15+Math.max(0,-wc_c)*0.38, f);
            shA  = _lp(-0.45,  wc*arS, f); shEl = _lp(0.82, 0.15+Math.max(0, wc_c)*0.42, f);
            atkT = _lp(0.09, 0, f);
        }
    }

    // Anatomy constants (local, origin = floor contact)
    const UA=17, FA=14, UL=18, LL=17;
    const SHL_X=11, SHL_Y=-36, HY=0, TORSO_TOP=-38, HEAD_CY=-62;

    c.save();
    c.translate(x, y - bob*sc);
    c.scale(dir*sc, sc);          // ← handles mirroring; no *dir inside
    c.rotate(lean + atkT);

    // ── Back leg ──────────────────────────────────────────────────────────────
    const [blKx,blKy] = bE(4, HY, legB, UL);
    const [blEx,blEy] = bE(blKx, blKy, legB+knB, LL);
    drawLimb(c, 4,HY, blKx,blKy, 11,8, C.armorDark);
    drawLimb(c, blKx,blKy, blEx,blEy, 8,6, C.armorDark);
    jnt(c, blKx,blKy, 4.5, '#2c3c48');
    c.fillStyle=C.boot;
    c.save(); c.translate(blEx,blEy); c.rotate(legB+knB);
    c.fillRect(-5,-2,14,6); c.restore();

    // ── Back arm (shield) ─────────────────────────────────────────────────────
    const [baKx,baKy] = bE(-SHL_X, SHL_Y, shA, UA);
    const [baEx,baEy] = bE(baKx, baKy, shA+shEl, FA);
    drawLimb(c, -SHL_X,SHL_Y, baKx,baKy, 10,8, C.armorDark);
    drawLimb(c,  baKx,baKy,   baEx,baEy,  8,6, C.armorDark);
    // Shield
    c.save();
    c.translate(baEx, baEy); c.rotate(shA+shEl - 0.28);
    c.fillStyle=C.shield; c.fillRect(-9,-16,18,30);
    c.strokeStyle=C.shBord; c.lineWidth=2; c.strokeRect(-9,-16,18,30);
    c.strokeStyle='#cc4444'; c.lineWidth=1.4;
    c.beginPath(); c.moveTo(0,-16); c.lineTo(0,14); c.stroke();
    c.beginPath(); c.moveTo(-9,0);  c.lineTo(9,0);  c.stroke();
    c.fillStyle='#aa3030'; c.beginPath(); c.arc(0,0,4,0,Math.PI*2); c.fill();
    c.restore();

    // ── Cloak ─────────────────────────────────────────────────────────────────
    c.fillStyle=C.cloakDark;
    c.beginPath(); c.moveTo(-9,TORSO_TOP+6); c.lineTo(-14,HY+1); c.lineTo(12,HY+1); c.lineTo(9,TORSO_TOP+6); c.closePath(); c.fill();
    c.fillStyle=C.cloak;
    c.beginPath(); c.moveTo(-7,TORSO_TOP+6); c.lineTo(-10,HY);   c.lineTo(10,HY);   c.lineTo(7,TORSO_TOP+6);  c.closePath(); c.fill();

    // ── Torso ─────────────────────────────────────────────────────────────────
    // Shoulder pads
    c.fillStyle=C.armorMid;
    c.beginPath(); c.arc(-SHL_X, SHL_Y, 9, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc( SHL_X, SHL_Y, 9, 0, Math.PI*2); c.fill();
    // Chest plate
    c.fillStyle=C.armorMid; c.fillRect(-9, TORSO_TOP+2, 18, 24);
    c.fillStyle=C.armorHi;  c.fillRect(-8, TORSO_TOP+3,  5,  9);
    // Breastplate lines
    c.strokeStyle=C.armorDark; c.lineWidth=1.8;
    c.beginPath(); c.moveTo(0,TORSO_TOP+2); c.lineTo(0,HY-2); c.stroke();
    c.lineWidth=1;
    for (let i=1;i<=2;i++) {
        c.beginPath(); c.moveTo(-9,TORSO_TOP+2+i*8); c.lineTo(9,TORSO_TOP+2+i*8); c.stroke();
    }
    // Pauldron outline
    c.strokeStyle='#283840'; c.lineWidth=1;
    c.beginPath(); c.arc(-SHL_X, SHL_Y, 9, 0, Math.PI*2); c.stroke();
    c.beginPath(); c.arc( SHL_X, SHL_Y, 9, 0, Math.PI*2); c.stroke();

    // ── Front arm (sword) ─────────────────────────────────────────────────────
    const [faKx,faKy] = bE(SHL_X, SHL_Y, swA, UA);
    const [faEx,faEy] = bE(faKx, faKy, swA+swEl, FA);
    drawLimb(c, SHL_X,SHL_Y, faKx,faKy, 10,8, C.armorMid);
    drawLimb(c, faKx,faKy,   faEx,faEy,  8,6, C.armorMid);
    jnt(c, faKx,faKy, 5,   C.armorDark);
    jnt(c, faEx,faEy, 5.5, C.armorDark);
    // Sword
    {
        const swa = swA + swEl;
        // Grip
        c.strokeStyle='#3a2812'; c.lineWidth=7; c.lineCap='round';
        c.beginPath(); c.moveTo(faEx,faEy); c.lineTo(faEx+Math.sin(swa)*13, faEy+Math.cos(swa)*13); c.stroke();
        // Guard
        const gx=faEx+Math.sin(swa)*14, gy=faEy+Math.cos(swa)*14;
        c.strokeStyle='#7a5818'; c.lineWidth=10;
        c.beginPath(); c.moveTo(gx-Math.cos(swa)*11, gy+Math.sin(swa)*11); c.lineTo(gx+Math.cos(swa)*11, gy-Math.sin(swa)*11); c.stroke();
        // Blade
        const bTX=gx+Math.sin(swa)*54, bTY=gy+Math.cos(swa)*54;
        const bg=c.createLinearGradient(gx,gy,bTX,bTY);
        bg.addColorStop(0,'#d8d8ee'); bg.addColorStop(1,'rgba(180,180,210,0.2)');
        c.strokeStyle=bg; c.lineWidth=5; c.lineCap='butt';
        c.beginPath(); c.moveTo(gx,gy); c.lineTo(bTX,bTY); c.stroke();
        // Shine
        c.strokeStyle='rgba(255,255,255,0.55)'; c.lineWidth=1.5;
        c.beginPath(); c.moveTo(gx+Math.cos(swa),gy-Math.sin(swa)); c.lineTo(bTX+Math.cos(swa),bTY-Math.sin(swa)); c.stroke();
    }

    // ── Front leg ─────────────────────────────────────────────────────────────
    const [flKx,flKy] = bE(-4, HY, legF, UL);
    const [flEx,flEy] = bE(flKx, flKy, legF+knF, LL);
    drawLimb(c, -4,HY, flKx,flKy, 11,8, C.armorMid);
    drawLimb(c, flKx,flKy, flEx,flEy, 8,6, C.armorMid);
    jnt(c, flKx,flKy, 4.5, C.armorDark);
    c.fillStyle=C.boot;
    c.save(); c.translate(flEx,flEy); c.rotate(legF+knF);
    c.fillRect(-5,-2,15,6); c.restore();

    // ── Head ──────────────────────────────────────────────────────────────────
    // Neck
    c.fillStyle=C.skin; c.fillRect(-3, HEAD_CY+8, 6, 9);
    // Helmet dome
    c.fillStyle=C.armorMid; c.beginPath(); c.arc(0,HEAD_CY,14,0,Math.PI*2); c.fill();
    // Visor band
    c.fillStyle='#18202e'; c.fillRect(-11,HEAD_CY-4,22,8);
    c.fillStyle='#22334a'; c.fillRect(-10,HEAD_CY-3,20,6);
    // Eye slit glow
    c.fillStyle='rgba(180,220,255,0.70)'; c.fillRect(-8,HEAD_CY-0.5,16,2);
    // Cheek guards
    c.fillStyle='#6a7a8e';
    c.fillRect(-18,HEAD_CY-4,8,13);
    c.fillRect( 10,HEAD_CY-4,8,13);
    // Nasal guard
    c.fillStyle='#788898'; c.fillRect(-1.5,HEAD_CY-4,3,9);
    // Plume (animated)
    for (let pi=0; pi<7; pi++) {
        const px = -4 + pi*1.4;
        const inSlash = ap>0.18 && ap<0.62;
        const pW = inSlash
            ? Math.sin(pi*1.4 + ap*14) * 6
            : Math.sin(t*3.8 + pi*0.95) * 2.4;
        c.fillStyle = pi < 4 ? C.plume : C.plume2;
        c.fillRect(px, HEAD_CY-15+pW, 2.5, 11);
    }
    // Helmet outline
    c.strokeStyle='#304050'; c.lineWidth=0.8;
    c.beginPath(); c.arc(0,HEAD_CY,14,0,Math.PI*2); c.stroke();

    c.restore();
}

// ── Slash trail ───────────────────────────────────────────────────────────────
const slashPts = [];

function getSwordTipWorld(x, y, t, sc, ap) {
    // Reconstruct sword tip from FK (matches drawRecruit with dir=1)
    const wc = Math.sin(t * 2.4);
    const bob = 2.8;
    let swA, swEl, atkT = 0;
    if (ap >= 0.22 && ap < 0.46) {
        const f = _e((ap-0.22)/0.24);
        swA  = _lp(-0.88, 1.28, f); swEl = _lp(0.22, 0.90, f);
        atkT = _lp(-0.14, 0.24, f);
    } else if (ap >= 0.46 && ap < 0.65) {
        const f = _e((ap-0.46)/0.19);
        swA  = _lp(1.28, 0.80, f); swEl = _lp(0.90, 0.44, f);
        atkT = _lp(0.24, 0.09, f);
    } else return null;

    const lean = 0.04;
    const totalA = lean + atkT;
    const UA=17, FA=14, SHL_X=11, SHL_Y=-36;
    const eaX = SHL_X + Math.sin(swA)*UA,     eaY = SHL_Y + Math.cos(swA)*UA;
    const swa = swA + swEl;
    const waX = eaX + Math.sin(swa)*FA,        waY = eaY + Math.cos(swa)*FA;
    // Grip start + 13px + blade 54px
    const tipLX = waX + Math.sin(swa)*(14+54), tipLY = waY + Math.cos(swa)*(14+54);
    // Rotate by totalA
    const cosA=Math.cos(totalA), sinA=Math.sin(totalA);
    const rotX = tipLX*cosA - tipLY*sinA;
    const rotY = tipLX*sinA + tipLY*cosA;
    return {
        x: x + rotX * sc,
        y: (y - (1-Math.abs(wc))*bob*sc) + rotY * sc
    };
}

function drawSlashTrail(c) {
    if (slashPts.length < 2) return;
    for (let i=1; i<slashPts.length; i++) {
        const p0=slashPts[i-1], p1=slashPts[i];
        const a = (1 - p1.age/18) * 0.75;
        c.strokeStyle=`rgba(210,230,255,${a})`;
        c.lineWidth = (1-p1.age/18)*6;
        c.lineCap='round';
        c.beginPath(); c.moveTo(p0.x,p0.y); c.lineTo(p1.x,p1.y); c.stroke();
    }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
const t0     = Date.now();
let   atkT   = 0;
const ATK_DUR = 1.5;   // seconds per attack cycle

function loop() {
    requestAnimationFrame(loop);
    const now = Date.now();
    const t   = (now - t0) / 1000;
    atkT = (atkT + (1/60) / ATK_DUR) % 1;

    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // ── Panels ────────────────────────────────────────────────────────────────
    const FLOOR_Y = 245;
    const panels = [
        { x:0,   w:240, bg:'#1c1428' },
        { x:240, w:240, bg:'#1a1828' },
        { x:480, w:240, bg:'#1e1418' },
    ];
    panels.forEach((p, i) => {
        ctx.fillStyle=p.bg; ctx.fillRect(p.x,0,p.w,H);
        if (i>0) {
            ctx.strokeStyle='#2a2038'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(p.x,0); ctx.lineTo(p.x,H); ctx.stroke();
        }
        // Floor line
        ctx.strokeStyle='#3a2d4a'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(p.x,FLOOR_Y); ctx.lineTo(p.x+p.w,FLOOR_Y); ctx.stroke();
        // Floor shadow
        const fg=ctx.createLinearGradient(0,FLOOR_Y,0,FLOOR_Y+22);
        fg.addColorStop(0,'rgba(0,0,0,0.35)'); fg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=fg; ctx.fillRect(p.x,FLOOR_Y,p.w,22);
        // Flagstone cracks
        ctx.strokeStyle='#2a2038'; ctx.lineWidth=1;
        for (let fi=0; fi<4; fi++) {
            const fx=p.x+30+fi*55;
            ctx.beginPath(); ctx.moveTo(fx,FLOOR_Y); ctx.lineTo(fx,FLOOR_Y+3); ctx.stroke();
        }
    });

    const sc = 1.0;

    // === Walk ===
    drawRecruit(ctx, 120, FLOOR_Y, t, 1, sc, 0, false);

    // === Run ===
    drawRecruit(ctx, 360, FLOOR_Y, t, 1, sc, 0, true);

    // === Attack ===
    // Update slash trail
    for (const p of slashPts) p.age++;
    while (slashPts.length && slashPts[0].age >= 18) slashPts.shift();

    const isSlash = atkT > 0.22 && atkT < 0.65;
    if (isSlash) {
        const tip = getSwordTipWorld(600, FLOOR_Y, t*0.12, sc, atkT);
        if (tip) slashPts.push({ x:tip.x, y:tip.y, age:0 });
    }

    drawSlashTrail(ctx);
    drawRecruit(ctx, 600, FLOOR_Y, t*0.12, 1, sc, atkT, false);

    // ── Labels (drawn on canvas) ───────────────────────────────────────────────
    ctx.font      = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(180,150,220,0.5)';
    ctx.fillText('🚶 Ходьба', 120, H-10);
    ctx.fillText('🏃 Біг',    360, H-10);
    ctx.fillText('⚔ Атака',  600, H-10);
}

loop();
</script>
</body>
</html>
