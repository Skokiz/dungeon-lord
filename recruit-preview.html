<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Рекрут — Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #0f0d18;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
}
h1 { color: #d4a030; font-size: 20px; letter-spacing: 3px; margin-bottom: 14px; text-transform: uppercase; }
canvas { border: 1px solid #2a2038; border-radius: 10px; box-shadow: 0 0 40px rgba(80,40,160,0.3); }
.labels { display: flex; width: 720px; margin-top: 10px; color: #887799; font-size: 13px; }
.labels div { flex: 1; text-align: center; }
</style>
</head>
<body>
<h1>⚔ Рекрут</h1>
<canvas id="c" width="720" height="300"></canvas>
<div class="labels">
  <div>🚶 Ходьба</div>
  <div>🏃 Біг</div>
  <div>⚔ Атака</div>
</div>

<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Helpers ───────────────────────────────────────────────────────────────────
const _e  = p => p*p*(3-2*p);
const _lp = (a,b,f) => a + (b-a)*f;

// Bone endpoint: angle from Y-axis (0=down), same convention as drawSkeleton
function bE(ox, oy, a, len) {
    return [ox + Math.sin(a)*len, oy + Math.cos(a)*len];
}

// Tapered limb rectangle (w1 at start, w2 at end)
function drawLimb(c, x1,y1, x2,y2, w1,w2, col) {
    const dx=x2-x1, dy=y2-y1;
    const len = Math.hypot(dx,dy);
    if (len < 0.01) return;
    c.save();
    c.translate(x1, y1);
    c.rotate(Math.atan2(dx, dy));   // atan2(sin, cos) = angle from Y-axis
    c.fillStyle = col;
    c.beginPath();
    c.moveTo(-w1/2, 0);   c.lineTo(w1/2, 0);
    c.lineTo( w2/2, len); c.lineTo(-w2/2, len);
    c.closePath(); c.fill();
    c.restore();
}

function jnt(c, jx,jy, r, col) {
    c.fillStyle=col; c.beginPath(); c.arc(jx,jy,r,0,Math.PI*2); c.fill();
}

// ── Colors ────────────────────────────────────────────────────────────────────
const C = {
    armorMid:  '#7e8fa4',
    armorDark: '#3a4a58',
    armorHi:   '#9bb0c4',
    cloak:     '#7a1520',
    cloakDark: '#4a0c10',
    skin:      '#c49868',
    boot:      '#251d0f',
    shield:    '#8a1020',
    shBord:    '#c84040',
    plume:     '#cc2030',
    plume2:    '#cc6020',
};

// ── Local anatomy constants ───────────────────────────────────────────────────
// Origin = HIP CENTER (NOT floor — caller offsets y = floorY - HIP_OFS)
const HY         =   0;   // hip
const TORSO_TOP  = -36;   // shoulder line
const SHL_X      =  10;   // shoulder half-width
const SHL_Y      = -34;   // shoulder y
const HEAD_CY    = -58;   // head circle center
const HEAD_R     =  13;
const UA = 16, FA = 13;   // upper/fore arm
const UL = 18, LL = 16;   // upper/lower leg

// ── drawRecruit ───────────────────────────────────────────────────────────────
// x,y  = HIP position in world (y = floorY - HIP_OFS)
// dir  = 1 (right) | -1 (left)
// sc   = pixel scale
// atk  = attack progress 0..1
// run  = bool
function drawRecruit(c, x, y, t, dir, sc, atk, run) {
    const spd  = run ? 3.2 : 2.4;
    const wc   = Math.sin(t * spd);
    const wc_c = Math.cos(t * spd);
    const bob  = run ? (1-Math.abs(wc))*4.2 : (1-Math.abs(wc))*2.6;
    const lean = run ? 0.10 : 0.03;

    // Leg swing fades when attacking
    const ap       = atk || 0;
    const legFade  = ap > 0 ? Math.max(0, 1 - ap*3.5) : 1;
    const lgS      = (run ? 0.60 : 0.46) * legFade;
    const legF     =  wc * lgS,  legB = -legF;
    const knF      = 0.10 + Math.max(0, wc_c)  * (run ? 0.85 : 0.65) * legFade;
    const knB      = 0.10 + Math.max(0,-wc_c)  * (run ? 0.85 : 0.65) * legFade;

    // Arm swing base
    const arS  = (run ? 0.40 : 0.28) * legFade;
    let swA    = -wc * arS;                              // sword arm angle
    let swEl   =  0.15 + Math.max(0,-wc_c)*0.36;        // sword elbow
    let shA    =  wc * arS;                              // shield arm
    let shEl   =  0.15 + Math.max(0, wc_c)*0.42;
    let atkT   =  0;

    // Attack overrides (no *dir — ctx.scale(dir*sc,sc) handles mirror)
    if (ap > 0) {
        if (ap < 0.22) {
            const f=_e(ap/0.22);
            swA  = _lp(-wc*arS, -0.85, f); swEl = _lp(swEl, 0.20, f);
            shA  = _lp( wc*arS, -0.15, f); shEl = _lp(shEl, 0.65, f);
            atkT = _lp(0, -0.13, f);
        } else if (ap < 0.46) {
            const f=_e((ap-0.22)/0.24);
            swA  = _lp(-0.85, 1.25, f); swEl = _lp(0.20, 0.88, f);
            shA  = _lp(-0.15,-0.42, f); shEl = _lp(0.65, 0.80, f);
            atkT = _lp(-0.13, 0.22, f);
        } else if (ap < 0.65) {
            const f=_e((ap-0.46)/0.19);
            swA  = _lp(1.25, 0.78, f); swEl = _lp(0.88, 0.42, f);
            atkT = _lp(0.22, 0.08, f);
        } else {
            const f=_e((ap-0.65)/0.35);
            swA  = _lp(0.78, -wc*arS, f); swEl = _lp(0.42, 0.15+Math.max(0,-wc_c)*0.36, f);
            shA  = _lp(-0.42,  wc*arS, f); shEl = _lp(0.80, 0.15+Math.max(0,wc_c)*0.42, f);
            atkT = _lp(0.08, 0, f);
        }
    }

    c.save();
    c.translate(x, y - bob*sc);
    c.scale(dir*sc, sc);           // ← mirror handled here; no *dir inside
    c.rotate(lean + atkT);

    // ── Back leg ──────────────────────────────────────────────────────────────
    const [blKx,blKy] = bE(3, HY, legB, UL);
    const [blEx,blEy] = bE(blKx,blKy, legB+knB, LL);
    drawLimb(c, 3,HY, blKx,blKy, 10,8, C.armorDark);
    drawLimb(c, blKx,blKy, blEx,blEy, 8,5, C.armorDark);
    jnt(c, blKx,blKy, 4, '#283848');
    // Boot
    c.save(); c.translate(blEx,blEy); c.rotate(legB+knB);
    c.fillStyle=C.boot; c.fillRect(-5,-2,13,5); c.restore();

    // ── Back arm + shield ─────────────────────────────────────────────────────
    const [baKx,baKy] = bE(-SHL_X, SHL_Y, shA, UA);
    const [baEx,baEy] = bE(baKx,baKy, shA+shEl, FA);
    drawLimb(c, -SHL_X,SHL_Y, baKx,baKy, 10,8, C.armorDark);
    drawLimb(c,  baKx,baKy, baEx,baEy, 8,5, C.armorDark);
    // Shield
    c.save();
    c.translate(baEx, baEy); c.rotate(shA+shEl - 0.25);
    c.fillStyle=C.shield; c.fillRect(-8,-14,16,28);
    c.strokeStyle=C.shBord; c.lineWidth=1.8; c.strokeRect(-8,-14,16,28);
    c.strokeStyle='#cc4040'; c.lineWidth=1.3;
    c.beginPath(); c.moveTo(0,-14); c.lineTo(0,14); c.stroke();
    c.beginPath(); c.moveTo(-8,-1); c.lineTo(8,-1); c.stroke();
    c.fillStyle='#aa2828'; c.beginPath(); c.arc(0,-1,3.5,0,Math.PI*2); c.fill();
    c.restore();

    // ── Cloak ─────────────────────────────────────────────────────────────────
    c.fillStyle=C.cloakDark;
    c.beginPath(); c.moveTo(-8,TORSO_TOP+5); c.lineTo(-13,HY+2); c.lineTo(11,HY+2); c.lineTo(8,TORSO_TOP+5); c.closePath(); c.fill();
    c.fillStyle=C.cloak;
    c.beginPath(); c.moveTo(-6,TORSO_TOP+5); c.lineTo(-10,HY+1); c.lineTo(9,HY+1); c.lineTo(6,TORSO_TOP+5); c.closePath(); c.fill();

    // ── Torso (shoulder pads → chest → belt) ──────────────────────────────────
    // Shoulder pads
    c.fillStyle=C.armorMid;
    c.beginPath(); c.arc(-SHL_X, SHL_Y, 8, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc( SHL_X, SHL_Y, 8, 0, Math.PI*2); c.fill();
    // Chest plate (full height from shoulder to hip)
    c.fillStyle=C.armorMid;
    c.fillRect(-8, TORSO_TOP+2, 16, 34);           // shoulders down to HY-2
    // Highlight
    c.fillStyle=C.armorHi;
    c.fillRect(-7, TORSO_TOP+3, 4, 8);
    // Belt
    c.fillStyle=C.armorDark;
    c.fillRect(-9, -6, 18, 8);
    c.fillStyle='#5a4010';
    c.fillRect(-3, -5, 6, 6);                      // belt buckle
    // Breastplate center line
    c.strokeStyle=C.armorDark; c.lineWidth=1.6;
    c.beginPath(); c.moveTo(0,TORSO_TOP+2); c.lineTo(0,-6); c.stroke();
    // Horizontal segments
    c.lineWidth=1;
    for (let i=1; i<=3; i++) {
        c.beginPath(); c.moveTo(-8,TORSO_TOP+2+i*8); c.lineTo(8,TORSO_TOP+2+i*8); c.stroke();
    }
    // Pauldron outline
    c.strokeStyle='#283848'; c.lineWidth=1;
    c.beginPath(); c.arc(-SHL_X, SHL_Y, 8, 0, Math.PI*2); c.stroke();
    c.beginPath(); c.arc( SHL_X, SHL_Y, 8, 0, Math.PI*2); c.stroke();

    // ── Front leg (drawn BEFORE sword so sword arm is on top) ─────────────────
    const [flKx,flKy] = bE(-3, HY, legF, UL);
    const [flEx,flEy] = bE(flKx,flKy, legF+knF, LL);
    drawLimb(c, -3,HY, flKx,flKy, 10,8, C.armorMid);
    drawLimb(c, flKx,flKy, flEx,flEy, 8,5, C.armorMid);
    jnt(c, flKx,flKy, 4, C.armorDark);
    // Boot
    c.save(); c.translate(flEx,flEy); c.rotate(legF+knF);
    c.fillStyle=C.boot; c.fillRect(-5,-2,14,5); c.restore();

    // ── Front arm + sword (drawn AFTER front leg → on top) ────────────────────
    const [faKx,faKy] = bE(SHL_X, SHL_Y, swA, UA);
    const [faEx,faEy] = bE(faKx,faKy, swA+swEl, FA);
    drawLimb(c, SHL_X,SHL_Y, faKx,faKy, 10,8, C.armorMid);
    drawLimb(c, faKx,faKy, faEx,faEy, 8,5, C.armorMid);
    jnt(c, faKx,faKy, 4.5, C.armorDark);
    jnt(c, faEx,faEy, 5,   C.armorDark);
    // Sword
    {
        const swa = swA + swEl;
        // Grip
        c.strokeStyle='#3a2812'; c.lineWidth=7; c.lineCap='round';
        c.beginPath(); c.moveTo(faEx,faEy); c.lineTo(faEx+Math.sin(swa)*12, faEy+Math.cos(swa)*12); c.stroke();
        // Guard
        const gx=faEx+Math.sin(swa)*13, gy=faEy+Math.cos(swa)*13;
        c.strokeStyle='#7a5818'; c.lineWidth=9;
        c.beginPath(); c.moveTo(gx-Math.cos(swa)*10, gy+Math.sin(swa)*10); c.lineTo(gx+Math.cos(swa)*10, gy-Math.sin(swa)*10); c.stroke();
        // Blade
        const bTX=gx+Math.sin(swa)*52, bTY=gy+Math.cos(swa)*52;
        const bg=c.createLinearGradient(gx,gy,bTX,bTY);
        bg.addColorStop(0,'#d8d8ee'); bg.addColorStop(1,'rgba(190,190,220,0.25)');
        c.strokeStyle=bg; c.lineWidth=5; c.lineCap='butt';
        c.beginPath(); c.moveTo(gx,gy); c.lineTo(bTX,bTY); c.stroke();
        // Shine
        c.strokeStyle='rgba(255,255,255,0.55)'; c.lineWidth=1.5;
        c.beginPath(); c.moveTo(gx+Math.cos(swa),gy-Math.sin(swa)); c.lineTo(bTX+Math.cos(swa),bTY-Math.sin(swa)); c.stroke();
    }

    // ── Head ──────────────────────────────────────────────────────────────────
    // Neck
    c.fillStyle=C.skin; c.fillRect(-3, HEAD_CY+HEAD_R-4, 6, 8);
    // Helmet dome
    c.fillStyle=C.armorMid; c.beginPath(); c.arc(0,HEAD_CY,HEAD_R,0,Math.PI*2); c.fill();
    // Visor band
    c.fillStyle='#18202e'; c.fillRect(-HEAD_R-1,HEAD_CY-4,HEAD_R*2+2,7);
    c.fillStyle='#22334a'; c.fillRect(-HEAD_R,HEAD_CY-3,HEAD_R*2,5);
    // Eye slit glow
    c.fillStyle='rgba(180,220,255,0.65)'; c.fillRect(-7,HEAD_CY-0.5,14,2);
    // Cheek guards
    c.fillStyle='#6a7a8e';
    c.fillRect(-HEAD_R-5, HEAD_CY-4, 6, 12);
    c.fillRect( HEAD_R-1, HEAD_CY-4, 6, 12);
    // Nasal guard
    c.fillStyle='#788898'; c.fillRect(-1.5, HEAD_CY-4, 3, 8);
    // Plume (animated, flaps during attack slash)
    for (let pi=0; pi<7; pi++) {
        const px = -4 + pi*1.4;
        const inSlash = ap>0.18 && ap<0.62;
        const pW = inSlash
            ? Math.sin(pi*1.5 + ap*16) * 6
            : Math.sin(t*3.8 + pi*0.9) * 2.2;
        c.fillStyle = pi < 4 ? C.plume : C.plume2;
        c.fillRect(px, HEAD_CY-HEAD_R-5+pW, 2.5, 10);
    }
    // Helmet outline
    c.strokeStyle='#304050'; c.lineWidth=0.8;
    c.beginPath(); c.arc(0,HEAD_CY,HEAD_R,0,Math.PI*2); c.stroke();

    c.restore();
}

// ── Slash trail ───────────────────────────────────────────────────────────────
const slashPts = [];
const HIP_OFS  = 30;   // hip is this many px above floor (sc=1)

function getSwordTip(atkX, floorY, t, sc, ap) {
    const wc = Math.sin(t * 2.4);
    const bob = (1-Math.abs(wc))*2.6;
    let swA, swEl, atkT=0;
    if      (ap >= 0.22 && ap < 0.46) { const f=_e((ap-0.22)/0.24); swA=_lp(-0.85,1.25,f); swEl=_lp(0.20,0.88,f); atkT=_lp(-0.13,0.22,f); }
    else if (ap >= 0.46 && ap < 0.65) { const f=_e((ap-0.46)/0.19); swA=_lp(1.25,0.78,f);  swEl=_lp(0.88,0.42,f); atkT=_lp(0.22,0.08,f); }
    else return null;

    // Reconstruct local sword tip
    const eaX = SHL_X + Math.sin(swA)*UA,    eaY = SHL_Y + Math.cos(swA)*UA;
    const swa  = swA + swEl;
    const waX  = eaX + Math.sin(swa)*FA,     waY  = eaY + Math.cos(swa)*FA;
    // Grip(12) + Guard(1) + Blade(52) = 65 ahead of wrist
    const tipLX = waX + Math.sin(swa)*65,    tipLY = waY + Math.cos(swa)*65;

    // Apply rotation (lean + atkT)
    const totalA = 0.03 + atkT;
    const cosA=Math.cos(totalA), sinA=Math.sin(totalA);
    const rotX = tipLX*cosA - tipLY*sinA;
    const rotY = tipLX*sinA + tipLY*cosA;

    const hipY = floorY - HIP_OFS*sc;
    return { x: atkX + rotX*sc, y: (hipY - bob*sc) + rotY*sc };
}

function drawSlashTrail(c) {
    if (slashPts.length < 2) return;
    c.save();
    for (let i=1; i<slashPts.length; i++) {
        const p0=slashPts[i-1], p1=slashPts[i];
        const a = (1 - p1.age/18) * 0.75;
        c.strokeStyle=`rgba(200,230,255,${a})`;
        c.lineWidth = (1-p1.age/18)*6;
        c.lineCap='round';
        c.beginPath(); c.moveTo(p0.x,p0.y); c.lineTo(p1.x,p1.y); c.stroke();
    }
    c.restore();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
const t0      = Date.now();
let   atkPhase = 0;
const ATK_DUR  = 1.5;

function loop() {
    requestAnimationFrame(loop);
    const t  = (Date.now() - t0) / 1000;
    atkPhase = (atkPhase + (1/60)/ATK_DUR) % 1;

    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // ── Panels ────────────────────────────────────────────────────────────────
    const FLOOR_Y = 240;
    const panels = [
        { x:0,   w:240, bg:'#1c1428' },
        { x:240, w:240, bg:'#1a1828' },
        { x:480, w:240, bg:'#1c1428' },   // same tone as walk
    ];
    panels.forEach((p, i) => {
        ctx.fillStyle=p.bg; ctx.fillRect(p.x, 0, p.w, H);
        if (i > 0) {
            ctx.strokeStyle='#2a2038'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(p.x,0); ctx.lineTo(p.x,H); ctx.stroke();
        }
        // Floor
        ctx.strokeStyle='#3a2d4a'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(p.x,FLOOR_Y); ctx.lineTo(p.x+p.w,FLOOR_Y); ctx.stroke();
        // Shadow below floor
        const fg=ctx.createLinearGradient(0,FLOOR_Y,0,FLOOR_Y+20);
        fg.addColorStop(0,'rgba(0,0,0,0.35)'); fg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=fg; ctx.fillRect(p.x,FLOOR_Y,p.w,20);
        // Flagstone joints
        ctx.strokeStyle='#2a2038'; ctx.lineWidth=1;
        for (let fi=0; fi<4; fi++) {
            const fx=p.x+25+fi*52;
            ctx.beginPath(); ctx.moveTo(fx,FLOOR_Y); ctx.lineTo(fx,FLOOR_Y+3); ctx.stroke();
        }
    });

    const sc    = 1.0;
    const hipY  = FLOOR_Y - HIP_OFS*sc;   // hip is HIP_OFS px above floor

    // === Walk ===
    drawRecruit(ctx, 120, hipY, t, 1, sc, 0, false);

    // === Run ===
    drawRecruit(ctx, 360, hipY, t, 1, sc, 0, true);

    // === Attack ===
    // Update trail
    for (const p of slashPts) p.age++;
    while (slashPts.length && slashPts[0].age >= 18) slashPts.shift();
    const isSlash = atkPhase > 0.22 && atkPhase < 0.65;
    if (isSlash) {
        const tip = getSwordTip(600, FLOOR_Y, t*0.10, sc, atkPhase);
        if (tip) slashPts.push({ x:tip.x, y:tip.y, age:0 });
    }
    drawSlashTrail(ctx);
    drawRecruit(ctx, 600, hipY, t*0.10, 1, sc, atkPhase, false);
}

loop();
</script>
</body>
</html>
