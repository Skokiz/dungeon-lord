<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Skeleton — Don't Starve style</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #12091e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 14px;
  font-family: monospace;
  color: #6655aa;
}
canvas { background: #1a1030; border-radius: 12px; }
p { font-size: 12px; }
</style>
</head>
<body>
<canvas id="c" width="320" height="220"></canvas>
<p>skeleton.js · Don't Starve style · walking animation</p>

<script>
// ═══════════════════════════════════════════════════════
//  skeleton.js  —  Don't Starve style animated skeleton
//  Use: drawSkeleton(ctx, x, y, time_seconds, direction)
// ═══════════════════════════════════════════════════════

const C = {
  outline : '#1a0800',
  bone    : '#ddd3a8',
  dim     : '#9e9474',   // back limbs
  joint   : '#c8be98',
  eye     : '#0e0400',
  tooth   : '#c4b478',
  glow    : 'rgba(80,255,120,0.18)',
};

// ── primitives ──────────────────────────────────────────

function capsule(x1, y1, x2, y2, r, fill) {
  const a = Math.atan2(y2 - y1, x2 - x1);
  ctx.beginPath();
  ctx.arc(x1, y1, r, a + Math.PI / 2, a - Math.PI / 2);
  ctx.arc(x2, y2, r, a - Math.PI / 2, a + Math.PI / 2);
  ctx.closePath();
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 2.4;
  ctx.stroke();
  ctx.fillStyle = fill;
  ctx.fill();
}

function dot(x, y, r, fill) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 1.8;
  ctx.stroke();
  ctx.fillStyle = fill;
  ctx.fill();
}

// ── skull ────────────────────────────────────────────────

function drawSkull(x, y, tilt) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);

  // cranium
  ctx.beginPath();
  ctx.ellipse(0, -4, 11, 13, 0, 0, Math.PI * 2);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 2.4;
  ctx.stroke();
  ctx.fillStyle = C.bone;
  ctx.fill();

  // jaw
  ctx.beginPath();
  ctx.ellipse(0, 7, 8.5, 5.5, 0, 0.05, Math.PI - 0.05);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 2;
  ctx.stroke();
  ctx.fillStyle = C.bone;
  ctx.fill();

  // eye sockets
  ctx.fillStyle = C.eye;
  ctx.beginPath(); ctx.ellipse(-4, -5, 3.6, 3.0, -0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 4, -5, 3.6, 3.0,  0.1, 0, Math.PI * 2); ctx.fill();

  // eye glow (green undead)
  ctx.fillStyle = C.glow;
  ctx.beginPath(); ctx.ellipse(-4, -5, 2, 1.8, -0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 4, -5, 2, 1.8,  0.1, 0, Math.PI * 2); ctx.fill();

  // nose
  ctx.fillStyle = C.eye;
  ctx.beginPath();
  ctx.moveTo(0, -0.5); ctx.lineTo(-2, 3); ctx.lineTo(2, 3);
  ctx.closePath(); ctx.fill();

  // teeth
  for (let i = -1; i <= 1; i++) {
    const tx = i * 4.8;
    ctx.beginPath();
    ctx.roundRect(tx - 2, 5.5, 3.6, 4.5, 0.8);
    ctx.strokeStyle = C.outline;
    ctx.lineWidth   = 1;
    ctx.stroke();
    ctx.fillStyle = C.tooth;
    ctx.fill();
  }

  ctx.restore();
}

// ── ribcage ──────────────────────────────────────────────

function drawRibcage(x, y) {
  // sternum
  capsule(x, y, x, y + 17, 2.2, C.bone);

  // clavicles
  capsule(x, y - 1, x - 10, y - 6, 1.8, C.bone);
  capsule(x, y - 1, x + 10, y - 6, 1.8, C.bone);

  // 3 rib pairs
  const ribs = [
    { ry: y + 2,  w: 11, h: 5 },
    { ry: y + 7,  w: 10, h: 4 },
    { ry: y + 12, w:  8, h: 3 },
  ];
  for (const { ry, w, h } of ribs) {
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(x, ry);
      ctx.quadraticCurveTo(x + side * w * 0.6, ry - 1, x + side * w, ry + h);
      ctx.lineWidth   = 2.4;
      ctx.strokeStyle = C.outline;
      ctx.stroke();
      ctx.lineWidth   = 1.2;
      ctx.strokeStyle = C.bone;
      ctx.stroke();
    }
  }
}

// ── limbs ────────────────────────────────────────────────

function drawLeg(hx, hy, thighA, dim) {
  const fill = dim ? C.dim : C.bone;
  const THIGH = 21, SHIN = 20;

  const kx = hx + Math.sin(thighA) * THIGH;
  const ky = hy + Math.cos(thighA) * THIGH;

  // shin bends slightly back when leg swings forward (natural walk)
  const shinA = thighA + 0.3 + Math.max(0, thighA) * 0.35;
  const ax = kx + Math.sin(shinA) * SHIN;
  const ay = ky + Math.cos(shinA) * SHIN;

  capsule(hx, hy, kx, ky, 4,   fill);
  dot    (kx, ky, 3.2,          fill);
  capsule(kx, ky, ax, ay, 3.2, fill);
  dot    (ax, ay, 2.6,          fill);

  // foot — mostly horizontal, slight downward toe
  capsule(ax, ay, ax + 9, ay + 2, 2.5, fill);
}

function drawArm(sx, sy, upperA, dim) {
  const fill = dim ? C.dim : C.bone;
  const UA = 15, FA = 13;

  const ex = sx + Math.sin(upperA) * UA;
  const ey = sy + Math.cos(upperA) * UA;
  const elbA = upperA + 0.35;
  const wx = ex + Math.sin(elbA) * FA;
  const wy = ey + Math.cos(elbA) * FA;

  capsule(sx, sy, ex, ey, 3,   fill);
  dot    (ex, ey, 2.4,          fill);
  capsule(ex, ey, wx, wy, 2.2, fill);

  // 3 fingers
  for (const da of [-0.32, 0, 0.32]) {
    const fa = elbA + da;
    capsule(wx, wy, wx + Math.sin(fa) * 5, wy + Math.cos(fa) * 5, 1.3, fill);
  }
}

// ── full skeleton ────────────────────────────────────────

function drawSkeleton(ctx_, x, y, t, dir = 1) {
  const wc    = Math.sin(t * 2.4);          // walk cycle  –1..1
  const bob   = (1 - Math.abs(wc)) * 2.8;  // dips at mid-stride
  const tilt  = wc * 0.04 * dir;

  const legA  = wc * 0.44 * dir;
  const armA  = -wc * 0.32 * dir;

  const HX = 0, HY = 0;
  const SPINE_TOP = -32;
  const NECK_Y    = -40;
  const HEAD_Y    = -54;
  const SHL_Y     = -28;
  const SHL_X     = 8;

  ctx_.save();
  ctx_.translate(x, y - bob);
  ctx_.rotate(tilt);
  ctx_.scale(dir, 1);  // flip for direction

  // back limbs first (behind body)
  drawLeg(-3, HY,     -legA, true);
  drawArm(-SHL_X, SHL_Y, -armA, true);

  // pelvis
  capsule(-8, HY - 2, 8, HY - 2, 4.5, C.bone);

  // spine
  capsule(HX, HY - 3, HX, SPINE_TOP, 2.8, C.bone);

  // ribcage
  drawRibcage(HX, SPINE_TOP - 2);

  // front arm
  drawArm(SHL_X, SHL_Y, armA, false);

  // front leg
  drawLeg(3, HY, legA, false);

  // neck
  capsule(HX, SPINE_TOP, HX, NECK_Y, 2.2, C.bone);

  // skull
  drawSkull(HX, HEAD_Y, wc * 0.05);

  ctx_.restore();
}

// ═══════════════════════════════════════════════════════
//  Preview loop
// ═══════════════════════════════════════════════════════

const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');
let t0 = null;

function loop(ts) {
  if (!t0) t0 = ts;
  const t = (ts - t0) / 1000;

  ctx.clearRect(0, 0, cvs.width, cvs.height);

  // ground
  ctx.beginPath();
  ctx.moveTo(0, 193); ctx.lineTo(320, 193);
  ctx.strokeStyle = '#2a1d42'; ctx.lineWidth = 1; ctx.stroke();

  // shadow
  const sx = 160 + Math.sin(t * 2.4) * 6;
  ctx.beginPath();
  ctx.ellipse(sx, 193, 24, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();

  drawSkeleton(ctx, 160, 183, t, 1);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
