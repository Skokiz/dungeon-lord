<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Skeleton — Don't Starve style</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0e0818;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 12px;
  font-family: monospace;
  color: #5544aa;
}
canvas { background: #120d22; border-radius: 14px; }
p { font-size: 11px; letter-spacing: 1px; }
</style>
</head>
<body>
<canvas id="c" width="340" height="310"></canvas>
<p>skeleton.js · Don't Starve style · v2</p>

<script>
// ═══════════════════════════════════════════════════════════
//  skeleton.js  v2  —  Don't Starve animated skeleton
//  API:  drawSkeleton(ctx, x, y, timeSec, direction=1)
//        x,y = hip center position
// ═══════════════════════════════════════════════════════════

const C = {
  outline  : '#180600',
  bone     : '#ddd3a2',   // main bone fill
  boneHL   : '#f4eccc',   // highlight (bright stripe)
  dim      : '#96906a',   // back/shadowed limbs
  dimHL    : '#b8b28a',
  joint    : '#c6bc8c',
  eye      : '#0b0300',
  eyeGlow  : 'rgba(50,255,90,0.30)',
  tooth    : '#c2b46e',
  crack    : '#180600',
};

// ── core bone primitive — capsule + highlight stripe ────────

function bone(x1, y1, x2, y2, r, dim = false) {
  const fill = dim ? C.dim : C.bone;
  const hl   = dim ? C.dimHL : C.boneHL;
  const a  = Math.atan2(y2 - y1, x2 - x1);
  // perpendicular unit vector (for highlight offset)
  const px = -Math.sin(a);
  const py =  Math.cos(a);

  // outline + fill
  ctx.beginPath();
  ctx.arc(x1, y1, r, a + Math.PI/2, a - Math.PI/2);
  ctx.arc(x2, y2, r, a - Math.PI/2, a + Math.PI/2);
  ctx.closePath();
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 2.8;
  ctx.stroke();
  ctx.fillStyle = fill;
  ctx.fill();

  // highlight stripe (upper-left of bone)
  const hr = r * 0.28;
  const ox = px * r * 0.42 - 1;
  const oy = py * r * 0.42 - 1;
  ctx.save();
  ctx.globalAlpha = 0.52;
  ctx.beginPath();
  ctx.arc(x1 + ox, y1 + oy, hr, a + Math.PI/2, a - Math.PI/2);
  ctx.arc(x2 + ox, y2 + oy, hr, a - Math.PI/2, a + Math.PI/2);
  ctx.closePath();
  ctx.fillStyle = hl;
  ctx.fill();
  ctx.restore();
}

// joint sphere with reflection dot
function jnt(x, y, r, dim = false) {
  const fill = dim ? C.dim : C.joint;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 1.8;
  ctx.stroke();
  ctx.fillStyle = fill;
  ctx.fill();
  // reflection
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(x - r * 0.3, y - r * 0.35, r * 0.32, 0, Math.PI * 2);
  ctx.fillStyle = dim ? C.dimHL : C.boneHL;
  ctx.fill();
  ctx.restore();
}

// ── skull ───────────────────────────────────────────────────

function drawSkull(x, y, tilt, jawOpen) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);

  // cranium
  ctx.beginPath();
  ctx.ellipse(0, -5, 14, 16, 0, 0, Math.PI * 2);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 2.8;
  ctx.stroke();
  ctx.fillStyle = C.bone;
  ctx.fill();

  // cranium highlight (top-left glow)
  ctx.save();
  ctx.globalAlpha = 0.38;
  ctx.beginPath();
  ctx.ellipse(-4, -10, 8, 9, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = C.boneHL;
  ctx.fill();
  ctx.restore();

  // temporal line (subtle ridge)
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = C.outline;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.ellipse(0, -5, 12, 14, 0, Math.PI * 1.15, Math.PI * 1.6);
  ctx.stroke();
  ctx.restore();

  // jaw (rotates slightly when walking)
  const jy = jawOpen * 2.5;
  ctx.save();
  ctx.translate(0, jy);
  ctx.beginPath();
  ctx.ellipse(0, 8, 10, 6.5, 0, 0.08, Math.PI - 0.08);
  ctx.strokeStyle = C.outline;
  ctx.lineWidth   = 2.4;
  ctx.stroke();
  ctx.fillStyle = C.bone;
  ctx.fill();

  // jaw highlight
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.ellipse(-3, 7, 5, 3, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = C.boneHL;
  ctx.fill();
  ctx.restore();

  // teeth (4 upper, bottom of cranium)
  for (let i = 0; i < 4; i++) {
    const tx = (i - 1.5) * 4.6;
    ctx.beginPath();
    ctx.roundRect(tx - 1.8, 4.5, 3.4, 5, 0.8);
    ctx.strokeStyle = C.outline;
    ctx.lineWidth   = 1;
    ctx.stroke();
    ctx.fillStyle = C.tooth;
    ctx.fill();
  }
  ctx.restore(); // jaw

  // eye sockets
  for (const sx of [-5, 5]) {
    ctx.beginPath();
    ctx.ellipse(sx, -7, 4.5, 3.8, sx < 0 ? -0.12 : 0.12, 0, Math.PI * 2);
    ctx.fillStyle = C.eye;
    ctx.fill();

    // green glow
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.ellipse(sx, -7.5, 2.6, 2.0, sx < 0 ? -0.12 : 0.12, 0, Math.PI * 2);
    ctx.fillStyle = C.eyeGlow;
    ctx.fill();
    ctx.restore();

    // bright eye core
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(sx, -7.5, 0.9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(160,255,180,0.9)';
    ctx.fill();
    ctx.restore();
  }

  // nose cavity
  ctx.beginPath();
  ctx.moveTo(0, -0.5); ctx.lineTo(-2.8, 3.5); ctx.lineTo(2.8, 3.5);
  ctx.closePath();
  ctx.fillStyle = C.eye;
  ctx.fill();

  // forehead crack
  ctx.save();
  ctx.strokeStyle = C.crack;
  ctx.lineWidth   = 1.1;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(2, -18); ctx.lineTo(1, -13); ctx.lineTo(3, -9); ctx.lineTo(1, -5);
  ctx.stroke();
  ctx.restore();

  ctx.restore();
}

// ── ribcage ─────────────────────────────────────────────────

function drawRibcage(x, y) {
  // sternum
  bone(x, y, x, y + 20, 2.5);

  // clavicles
  bone(x, y, x - 12, y - 8, 2);
  bone(x, y, x + 12, y - 8, 2);

  // 4 rib pairs (outer stroke trick: draw dark then bone-colored thinner)
  const ribs = [
    { ry: y + 2,  w: 14, h: 7  },
    { ry: y + 7,  w: 13, h: 6  },
    { ry: y + 12, w: 11, h: 5  },
    { ry: y + 17, w:  8, h: 3  },  // floating ribs
  ];

  for (const { ry, w, h } of ribs) {
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(x, ry);
      ctx.bezierCurveTo(
        x + s * w * 0.4, ry - 2,
        x + s * w,       ry + h * 0.5,
        x + s * w,       ry + h
      );
      ctx.lineWidth   = 3;
      ctx.strokeStyle = C.outline;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.lineWidth   = 1.5;
      ctx.strokeStyle = C.bone;
      ctx.stroke();
    }
  }
}

// ── limbs ────────────────────────────────────────────────────

// kneeBend: how much the knee bends (0 = straight, 0.9 = very bent)
// shinA = thighA - kneeBend  →  shin sweeps backward = knee bends forward (natural human gait)
function drawLeg(hx, hy, thighA, kneeBend, dim) {
  const THIGH = 26, SHIN = 24;

  const kx = hx + Math.sin(thighA) * THIGH;
  const ky = hy + Math.cos(thighA) * THIGH;

  const shinA = thighA - kneeBend;
  const ax = kx + Math.sin(shinA) * SHIN;
  const ay = ky + Math.cos(shinA) * SHIN;

  bone(hx, hy, kx, ky, 5,   dim);
  jnt (kx, ky, 4,            dim);
  bone(kx, ky, ax, ay, 4,   dim);
  jnt (ax, ay, 3.2,          dim);

  // foot: follows ankle, more horizontal than shin
  const footA = shinA * 0.4;
  const fx = ax + Math.cos(footA) * 11;
  const fy = ay + Math.abs(Math.sin(footA)) * 2 + 2;
  bone(ax, ay, fx,      fy,     3,   dim);
  bone(fx, fy, fx + 4,  fy + 1, 1.8, dim);
}

// elbowBend: how much the elbow bends
// elbA = upperA - elbowBend  →  forearm sweeps back = natural arm swing
function drawArm(sx, sy, upperA, elbowBend, dim) {
  const UA = 19, FA = 16;

  const ex = sx + Math.sin(upperA) * UA;
  const ey = sy + Math.cos(upperA) * UA;
  const elbA = upperA - elbowBend;
  const wx = ex + Math.sin(elbA) * FA;
  const wy = ey + Math.cos(elbA) * FA;

  bone(sx, sy, ex, ey, 3.5, dim);
  jnt (ex, ey, 2.8,          dim);
  bone(ex, ey, wx, wy, 2.8, dim);

  // 3 bony fingers
  for (const [da, len] of [[-0.32, 6], [0, 7], [0.32, 6]]) {
    const fa = elbA + da;
    bone(wx, wy, wx + Math.sin(fa)*len, wy + Math.cos(fa)*len, 1.4, dim);
  }
}

// ── full skeleton ────────────────────────────────────────────

function drawSkeleton(ctx_, x, y, t, dir = 1) {
  const spd   = 2.2;
  const wc    = Math.sin(t * spd);          // -1..1  primary walk phase
  const wc_c  = Math.cos(t * spd);          // cosine — quadrature phase
  const bob   = (1 - Math.abs(wc)) * 3.5;  // body highest at mid-stride
  const hipT  = wc_c * 0.08 * dir;         // hip side-tilt
  const jawOpen = Math.abs(Math.sin(t * 1.1)) * 0.28;

  // ── leg angles (thigh from vertical, + = forward) ──
  const legA_F = wc * 0.52 * dir;   // front leg
  const legA_B = -legA_F;           // back leg (opposite)

  // ── knee bend: maximum during mid-swing, minimum at contact/push-off ──
  //    front leg swings forward when wc is increasing → wc_c > 0
  const knee_F = 0.08 + Math.max(0,  wc_c) * 0.85;
  //    back leg swings forward when wc is decreasing → wc_c < 0
  const knee_B = 0.08 + Math.max(0, -wc_c) * 0.85;

  // ── arm angles (opposite to legs) ──
  const armA_F = -wc * 0.40 * dir;
  const armA_B = -armA_F;

  // ── elbow bend: arms opposite phase to their leg ──
  //    front arm swings forward when wc_c < 0
  const elbow_F = 0.12 + Math.max(0, -wc_c) * 0.55;
  //    back arm swings forward when wc_c > 0
  const elbow_B = 0.12 + Math.max(0,  wc_c) * 0.55;

  // Anatomy landmarks
  const HX = 0, HY = 0;
  const SPINE_TOP = -40;
  const RIB_Y    = SPINE_TOP - 2;
  const SHL_Y    = SPINE_TOP + 4;
  const SHL_X    = 12;
  const NECK_Y   = SPINE_TOP - 10;
  const HEAD_Y   = NECK_Y - 18;

  ctx_.save();
  ctx_.translate(x, y - bob);
  ctx_.rotate(0.07 * dir + hipT);  // forward lean + hip rock
  ctx_.scale(1.45, 1.45);

  // ── back limbs ────────────────────────────────────
  drawLeg( 4, HY,         legA_B, knee_B, true);
  drawArm(-SHL_X, SHL_Y,  armA_B, elbow_B, true);

  // ── pelvis ────────────────────────────────────────
  bone(-10, HY - 2, 10, HY - 2, 5.5);

  // ── spine (slight S-curve) ────────────────────────
  const smid = SPINE_TOP * 0.5;
  bone(HX,     HY - 3,  HX + 1, smid,      3.2);
  bone(HX + 1, smid,    HX,     SPINE_TOP, 3.0);

  // ── ribcage ───────────────────────────────────────
  drawRibcage(HX, RIB_Y);

  // ── front arm ─────────────────────────────────────
  drawArm(SHL_X, SHL_Y, armA_F, elbow_F, false);

  // ── front leg ─────────────────────────────────────
  drawLeg(-4, HY, legA_F, knee_F, false);

  // ── neck ──────────────────────────────────────────
  bone(HX, SPINE_TOP, HX, NECK_Y, 2.8);

  // ── skull ─────────────────────────────────────────
  drawSkull(HX, HEAD_Y, wc * 0.06 * dir, jawOpen);

  ctx_.restore();
}

// ═══════════════════════════════════════════════════════════
//  Preview — background + animation loop
// ═══════════════════════════════════════════════════════════

const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');

// pre-draw ground texture once
function drawBg() {
  // distant fog
  const fog = ctx.createRadialGradient(170, 200, 10, 170, 200, 160);
  fog.addColorStop(0, 'rgba(40,15,80,0.35)');
  fog.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = fog;
  ctx.fillRect(0, 0, 340, 310);

  // ground line + subtle dirt
  ctx.strokeStyle = '#221640';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(20, 238); ctx.lineTo(320, 238);
  ctx.stroke();

  // ground surface gradient
  const gr = ctx.createLinearGradient(0, 235, 0, 260);
  gr.addColorStop(0, 'rgba(30,18,50,0.5)');
  gr.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 235, 340, 30);
}

let t0 = null;

function loop(ts) {
  if (!t0) t0 = ts;
  const t = (ts - t0) / 1000;

  ctx.clearRect(0, 0, 340, 310);
  drawBg();

  // ground shadow (stretches with walk cycle)
  const sw  = 28 + Math.abs(Math.sin(t * 2.2)) * 6;
  const sox = 170 + Math.sin(t * 2.2) * 8;
  ctx.beginPath();
  ctx.ellipse(sox, 238, sw, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // HIP is at y=222 (feet reach ground at ~238)
  drawSkeleton(ctx, 170, 222, t, 1);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
