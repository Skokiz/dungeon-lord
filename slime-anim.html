<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Slime — Walk / Run / Attack</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#09060f;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; gap:14px; padding:28px 16px;
    font-family:'Courier New', monospace;
}
h1 { color:#44dd44; font-size:13px; letter-spacing:4px; }
.panels { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
.panel { display:flex; flex-direction:column; align-items:center; gap:6px; }
canvas { border-radius:12px; border:1px solid #1e1030; }
.lbl { font-size:10px; letter-spacing:3px; color:#336633; }
</style>
</head>
<body>
<h1>🟢  SLIME · ANIMATIONS</h1>
<div class="panels">
    <div class="panel"><canvas id="c-idle" width="160" height="160"></canvas><div class="lbl">IDLE</div></div>
    <div class="panel"><canvas id="c-walk" width="160" height="160"></canvas><div class="lbl">WALK</div></div>
    <div class="panel"><canvas id="c-run"  width="160" height="160"></canvas><div class="lbl">RUN</div></div>
    <div class="panel"><canvas id="c-atk"  width="160" height="160"></canvas><div class="lbl">ATTACK</div></div>
</div>
<script>
const W = 160, H = 160;
const FLOOR_Y = 118; // y of ground surface
const R = 28;        // slime radius in preview (game size/2 * ~2.3x)

// ── Draw one frame of slime ────────────────────────────────────────────────
// sx/sy: horizontal/vertical scale (squish/stretch)
// xOff:  horizontal offset from center
// eyeDir: -1 left, 0 center, 1 right
// blink:  0=open  1=closed
function drawSlime(ctx, cx, baseY, sx, sy, eyeDir, blink) {
    const x  = cx;
    const y  = baseY - R * sy; // body center: sits on floor

    // Shadow on floor
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.beginPath();
    ctx.ellipse(cx, FLOOR_Y + 2, R * sx * 1.15, R * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body — radial gradient (same colours as game)
    const rg = ctx.createRadialGradient(x - R*0.3*sx, y - R*0.25*sy, R*0.08,
                                         x, y, R * Math.max(sx, sy) + 3);
    rg.addColorStop(0,    'rgba(160,255,160,0.97)');
    rg.addColorStop(0.45, 'rgba(60,200,60,0.90)');
    rg.addColorStop(1,    'rgba(20,120,20,0.75)');
    ctx.fillStyle = rg;
    ctx.shadowColor = '#000';
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.ellipse(x, y, R * sx, R * sy, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes
    const eyeSpreadX = R * 0.38 * sx;
    const eyeBaseY   = y - R * 0.08 * sy;
    const er         = R * 0.21;
    const blinkH     = er * Math.max(0.04, 1 - blink);

    [-1, 1].forEach(side => {
        const ex = x + side * eyeSpreadX + eyeDir * R * 0.07;
        const ey = eyeBaseY;

        // White sclera
        ctx.fillStyle = '#e6ffe6';
        ctx.beginPath();
        ctx.ellipse(ex, ey, er, blinkH, 0, 0, Math.PI * 2);
        ctx.fill();

        if (blink < 0.8) {
            // Pupil
            ctx.fillStyle = '#0d1a0d';
            ctx.beginPath();
            ctx.ellipse(ex + eyeDir * er * 0.28, ey, er * 0.55, er * 0.55 * (1 - blink * 0.7), 0, 0, Math.PI * 2);
            ctx.fill();
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            ctx.beginPath();
            ctx.arc(ex - er * 0.22, ey - blinkH * 0.28, er * 0.18, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Specular highlight on body
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.beginPath();
    ctx.ellipse(x - R*0.28*sx, y - R*0.33*sy, R*0.27*sx, R*0.14*sy, -0.45, 0, Math.PI * 2);
    ctx.fill();
}

// ── Dungeon floor background ───────────────────────────────────────────────
function drawBg(ctx) {
    // ceiling/wall
    ctx.fillStyle = '#0e0820';
    ctx.fillRect(0, 0, W, FLOOR_Y);
    // floor slab
    const fg = ctx.createLinearGradient(0, FLOOR_Y, 0, H);
    fg.addColorStop(0, '#2a1848');
    fg.addColorStop(1, '#160d2a');
    ctx.fillStyle = fg;
    ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);
    // floor edge highlight
    ctx.fillStyle = '#4a2878';
    ctx.fillRect(0, FLOOR_Y, W, 2);
    ctx.fillStyle = 'rgba(140,80,220,0.15)';
    ctx.fillRect(0, FLOOR_Y + 2, W, 3);
}

// ── Hop deformation helper ─────────────────────────────────────────────────
// phase 0..1 → { sx, sy, yOff }
function hopDeform(phase, strength) {
    const air = Math.max(0, Math.sin(phase * Math.PI)); // arc 0→1→0

    // squish when grounded, stretch when airborne
    let sx = 1 + (1 - air) * 0.30 * strength - air * 0.18 * strength;
    let sy = 1 - (1 - air) * 0.22 * strength + air * 0.22 * strength;

    // Extra landing-impact squish spike at phase ≈ 0.90
    if (phase > 0.80 && phase < 1.0) {
        const spike = Math.sin((phase - 0.80) / 0.20 * Math.PI) * 0.18 * strength;
        sx += spike;
        sy -= spike * 0.8;
    }

    const yOff = air * 38 * strength;
    return { sx, sy, yOff };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1-2*(1-t)*(1-t); }

// ── Dust puff helper ───────────────────────────────────────────────────────
function dustPuff(ctx, cx, alpha, scaleX) {
    ctx.fillStyle = `rgba(90,55,130,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(cx, FLOOR_Y + 1, 14 * scaleX, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // small side puffs
    [-18, 18].forEach(dx => {
        ctx.fillStyle = `rgba(90,55,130,${alpha * 0.45})`;
        ctx.beginPath();
        ctx.ellipse(cx + dx * scaleX, FLOOR_Y + 2, 6, 3, 0, 0, Math.PI * 2);
        ctx.fill();
    });
}

// ── State ──────────────────────────────────────────────────────────────────
const walk = { x: W/2, dir: 1, phase: 0 };
const run  = { x: W/2, dir: 1, phase: 0 };
let atkTimer = 0;
let lastTs   = null;

// ── Main loop ──────────────────────────────────────────────────────────────
function loop(ts) {
    const dt = lastTs ? Math.min((ts - lastTs) / 1000, 0.05) : 0;
    lastTs = ts;
    requestAnimationFrame(loop);

    const elapsed = ts / 1000;

    // ── IDLE ──────────────────────────────────────────────────────────────
    {
        const ctx = document.getElementById('c-idle').getContext('2d');
        drawBg(ctx);

        const wobble  = Math.sin(elapsed * 2.1) * 1.6;
        const breathe = Math.sin(elapsed * 1.3) * 0.022;
        const sx = 1 + breathe + wobble * 0.005;
        const sy = 1 - breathe - wobble * 0.005;

        // Blink every ~3 s
        const bc = elapsed % 3.4;
        const blink = (bc > 3.1)
            ? clamp(Math.sin((bc - 3.1) / 0.15 * Math.PI), 0, 1)
            : 0;

        drawSlime(ctx, W / 2, FLOOR_Y, sx, sy, 0, blink);
    }

    // ── WALK ──────────────────────────────────────────────────────────────
    {
        const ctx = document.getElementById('c-walk').getContext('2d');
        const HOP_PERIOD = 0.60;
        const HOP_DIST   = 42; // px per hop

        walk.phase += dt / HOP_PERIOD;
        if (walk.phase >= 1) {
            walk.phase -= 1;
            walk.x += walk.dir * HOP_DIST;
            if (walk.x > W - 44) { walk.dir = -1; walk.x = W - 44; }
            if (walk.x < 44)     { walk.dir =  1; walk.x = 44; }
        }

        drawBg(ctx);
        const { sx, sy, yOff } = hopDeform(walk.phase, 1.0);

        // Dust at landing
        if (walk.phase > 0.82 && walk.phase < 0.98) {
            const a = Math.sin((walk.phase - 0.82) / 0.16 * Math.PI) * 0.5;
            dustPuff(ctx, walk.x, a, 1.0);
        }

        drawSlime(ctx, walk.x, FLOOR_Y - yOff, sx, sy, walk.dir, 0);
    }

    // ── RUN ───────────────────────────────────────────────────────────────
    {
        const ctx = document.getElementById('c-run').getContext('2d');
        const HOP_PERIOD = 0.30;
        const HOP_DIST   = 52;

        run.phase += dt / HOP_PERIOD;
        if (run.phase >= 1) {
            run.phase -= 1;
            run.x += run.dir * HOP_DIST;
            if (run.x > W - 40) { run.dir = -1; run.x = W - 40; }
            if (run.x < 40)     { run.dir =  1; run.x = 40; }
        }

        drawBg(ctx);
        const { sx, sy, yOff } = hopDeform(run.phase, 1.45); // stronger squish

        // Bigger dust cloud + trail
        if (run.phase > 0.78 && run.phase < 0.98) {
            const a = Math.sin((run.phase - 0.78) / 0.20 * Math.PI) * 0.7;
            dustPuff(ctx, run.x, a, 1.4);
            // motion trail
            ctx.fillStyle = `rgba(40,180,40,${a * 0.18})`;
            ctx.beginPath();
            ctx.ellipse(run.x - run.dir * 20, FLOOR_Y - yOff * 0.5, R * sx * 0.7, R * sy * 0.7, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        drawSlime(ctx, run.x, FLOOR_Y - yOff, sx, sy, run.dir, 0);
    }

    // ── ATTACK ────────────────────────────────────────────────────────────
    {
        const ctx = document.getElementById('c-atk').getContext('2d');
        atkTimer += dt;

        // Sequence timing
        const SEQ = [
            { dur: 0.28 }, // 0 windup:  lean back, squish up
            { dur: 0.11 }, // 1 lunge:   fast forward stretch
            { dur: 0.09 }, // 2 impact:  horizontal squash + flash
            { dur: 0.20 }, // 3 recoil:  bounce back
            { dur: 0.60 }, // 4 settle:  spring return + idle
        ];
        const totalDur = SEQ.reduce((a, s) => a + s.dur, 0);
        const tCycle   = atkTimer % totalDur;

        let seg = 0, tSeg = 0, acc = 0;
        for (let i = 0; i < SEQ.length; i++) {
            if (tCycle < acc + SEQ[i].dur) { seg = i; tSeg = (tCycle - acc) / SEQ[i].dur; break; }
            acc += SEQ[i].dur;
        }

        let sx = 1, sy = 1, xOff = 0, eyeDir = 1, blink = 0;

        if (seg === 0) {                           // ── windup
            const f = easeOut(tSeg);
            sx   = lerp(1,    0.70, f);
            sy   = lerp(1,    1.38, f);
            xOff = lerp(0,   -12,   f);
            eyeDir = 1;
        } else if (seg === 1) {                    // ── lunge
            const f = easeOut(tSeg);
            sx   = lerp(0.70, 1.65, f);
            sy   = lerp(1.38, 0.65, f);
            xOff = lerp(-12,  26,   f);
            eyeDir = 1;
        } else if (seg === 2) {                    // ── impact
            const f = tSeg;
            const spike = Math.sin(f * Math.PI);
            sx   = 1.65 + spike * 0.25;
            sy   = 0.65 - spike * 0.15;
            xOff = 26;
            eyeDir = 1;
            // green flash
            ctx.fillStyle = `rgba(100,255,80,${spike * 0.30})`;
            ctx.fillRect(0, 0, W, H);
        } else if (seg === 3) {                    // ── recoil
            const f = easeOut(tSeg);
            sx   = lerp(1.65, 1.12, f);
            sy   = lerp(0.65, 0.92, f);
            xOff = lerp(26,  -8,    f);
            eyeDir = -1;
        } else {                                   // ── settle / spring
            const spring = Math.exp(-tSeg * 7) * Math.cos(tSeg * 22) * 0.12;
            sx   = 1 + spring;
            sy   = 1 - spring;
            xOff = lerp(-8, 0, Math.min(1, tSeg * 4));
            eyeDir = 1;
            if (tSeg > 0.28 && tSeg < 0.46)
                blink = Math.sin((tSeg - 0.28) / 0.18 * Math.PI);
        }

        drawBg(ctx);

        // Projectile blob (visible during lunge + first half of impact)
        if (seg === 1 || (seg === 2 && tSeg < 0.55)) {
            const progress = seg === 1 ? tSeg : 1;
            const pX = W/2 + xOff + R * sx * 1.05 + progress * 24;
            const pY = FLOOR_Y - R * 0.6;
            const pr  = lerp(7, 5, progress);
            const pg  = ctx.createRadialGradient(pX - pr*0.3, pY - pr*0.3, 1, pX, pY, pr + 3);
            pg.addColorStop(0, 'rgba(200,255,180,0.95)');
            pg.addColorStop(1, 'rgba(30,160,20,0.30)');
            ctx.fillStyle = pg;
            ctx.shadowColor = '#44ff44';
            ctx.shadowBlur  = 8;
            ctx.beginPath();
            ctx.ellipse(pX, pY, pr * 1.35, pr * 0.75, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // droplet tail
            for (let i = 1; i <= 3; i++) {
                const tx = pX - i * 7;
                const ta = (1 - i / 4) * 0.35;
                ctx.fillStyle = `rgba(60,200,40,${ta})`;
                ctx.beginPath();
                ctx.arc(tx, pY + (i % 2 === 0 ? 2 : -1), pr * 0.4 * (1 - i*0.2), 0, Math.PI*2);
                ctx.fill();
            }
        }

        drawSlime(ctx, W/2 + xOff, FLOOR_Y, sx, sy, eyeDir, blink);
    }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
