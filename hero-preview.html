<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hero — Don't Starve Chibi preview</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0e0818;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; gap:8px; padding:16px;
  font-family:monospace; color:#aaa;
}
canvas { background:#120d22; border-radius:14px; display:block; }
.controls {
  display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
}
button {
  background:#1e1235; color:#ccc; border:1px solid #443366;
  border-radius:6px; padding:5px 14px; cursor:pointer; font:12px monospace;
}
button:hover { background:#2e1e55; }
button.active { background:#4422aa; color:#fff; border-color:#8866ff; }
p { font-size:11px; letter-spacing:1px; color:#5544aa; }
</style>
</head>
<body>
<canvas id="c" width="760" height="260"></canvas>
<div class="controls">
  <button id="bNormal"   class="active" onclick="setRank('normal')">Normal</button>
  <button id="bEliteHp"  onclick="setRank('elite_hp')">Elite HP</button>
  <button id="bEliteAtk" onclick="setRank('elite_atk')">Elite ATK</button>
  <button id="bBoss"     onclick="setRank('boss')">Boss</button>
</div>
<div class="controls">
  <button id="wSword"  class="active" onclick="setWeapon('sword')">⚔ Sword</button>
  <button id="wSpear"  onclick="setWeapon('spear')">🗡 Spear</button>
  <button id="wStaff"  onclick="setWeapon('staff')">🪄 Staff</button>
  <button id="wAxe"    onclick="setWeapon('axe')">🪓 Axe</button>
  <button id="wDagger" onclick="setWeapon('dagger')">🔪 Dagger</button>
</div>
<p>← all 4 ranks · current weapon →   |   click buttons to change</p>

<script>
const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');

// ── helpers ──────────────────────────────────────────────
function ctxRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ── drawHero ─────────────────────────────────────────────
// sc = scale factor (game uses 0.38; preview uses larger values)
function drawHero(ctx_,x,y,t,dir=1,rank='normal',weapon='sword',lv=1,sc=0.38){
  const R={
    normal:   {c:'#8b1a1a',b:'#cc2233',h:'#7a7a8a',hl:'#b0b2c0',bt:'#2a1a1a',ec:'#ffeecc'},
    elite_hp: {c:'#115533',b:'#22aa66',h:'#44cc88',hl:'#88ffcc',bt:'#112211',ec:'#44ffaa'},
    elite_atk:{c:'#883300',b:'#ee6600',h:'#ffaa44',hl:'#ffd088',bt:'#331100',ec:'#ffcc44'},
    boss:     {c:'#550066',b:'#aa00cc',h:'#cc88ff',hl:'#eeccff',bt:'#220033',ec:'#ee88ff'},
  }[rank]||{c:'#8b1a1a',b:'#cc2233',h:'#7a7a8a',hl:'#b0b2c0',bt:'#2a1a1a',ec:'#ffeecc'};
  const OL='#090200',spd=2.4,wc=Math.sin(t*spd),wc_c=Math.cos(t*spd);
  const bob=(1-Math.abs(wc))*2;
  const lF=wc*0.44,lB=-lF,kF=0.06+Math.max(0,wc_c)*0.68,kB=0.06+Math.max(0,-wc_c)*0.68;
  const aF=-wc*0.32,aB=-aF,eF=0.10+Math.max(0,-wc_c)*0.30,eB=0.10+Math.max(0,wc_c)*0.30;
  const THIGH=17,SHIN=14,UA=12,FA=10;
  const HX=0,HY=0,SP=-26,SX=10,SY=SP+3,NY=SP-5,HHY=NY-12;

  function cap(x1,y1,x2,y2,r,f,dim){
    const a=Math.atan2(y2-y1,x2-x1),px=-Math.sin(a),py=Math.cos(a);
    ctx.beginPath();ctx.arc(x1,y1,r,a+Math.PI/2,a-Math.PI/2);ctx.arc(x2,y2,r,a-Math.PI/2,a+Math.PI/2);ctx.closePath();
    ctx.strokeStyle=OL;ctx.lineWidth=2.2;ctx.stroke();ctx.fillStyle=dim?'#334455':f;ctx.fill();
    ctx.save();ctx.globalAlpha=0.28;
    ctx.beginPath();ctx.arc(x1+px*r*0.38,y1+py*r*0.38,r*0.28,a+Math.PI/2,a-Math.PI/2);ctx.arc(x2+px*r*0.38,y2+py*r*0.38,r*0.28,a-Math.PI/2,a+Math.PI/2);ctx.closePath();
    ctx.fillStyle='#fff';ctx.fill();ctx.restore();
  }
  function leg(hx,hy,thA,kBend,dim){
    const kx=hx+Math.sin(thA)*THIGH,ky=hy+Math.cos(thA)*THIGH;
    const sA=thA-kBend,ax=kx+Math.sin(sA)*SHIN,ay=ky+Math.cos(sA)*SHIN;
    cap(hx,hy,kx,ky,5.5,R.b,dim);cap(kx,ky,ax,ay,4.5,R.bt,dim);
    cap(ax,ay,ax+Math.cos(sA*0.3)*9,ay+2.5,3.5,R.bt,dim);
  }
  function arm(sx,sy,uA,eBend,dim){
    const ex=sx+Math.sin(uA)*UA,ey=sy+Math.cos(uA)*UA;
    const eA=uA+eBend,wx=ex+Math.sin(eA)*FA,wy=ey+Math.cos(eA)*FA;
    cap(sx,sy,ex,ey,4,R.h,dim);cap(ex,ey,wx,wy,3.5,R.h,dim);
    return[wx,wy,eA];
  }

  ctx_.save();ctx_.translate(x,y-bob*sc);ctx_.scale(dir*sc,sc);

  // back side
  leg(3,HY,lB,kB,true);arm(-SX,SY,aB,eB,true);

  // cloak
  ctx.fillStyle=R.c;
  ctx.beginPath();ctx.moveTo(0,SP);ctx.bezierCurveTo(-15,SP+8,-18,HY-4,-13,HY+18);ctx.lineTo(13,HY+18);ctx.bezierCurveTo(18,HY-4,15,SP+8,0,SP);ctx.closePath();
  ctx.strokeStyle=OL;ctx.lineWidth=2.2;ctx.stroke();ctx.fill();
  ctx.save();ctx.globalAlpha=0.20;ctx.fillStyle='#000';ctx.beginPath();ctx.moveTo(-3,SP+2);ctx.bezierCurveTo(-16,SP+10,-16,HY,-10,HY+18);ctx.lineTo(-2,HY+18);ctx.closePath();ctx.fill();ctx.restore();

  // torso
  ctx.beginPath();ctxRoundRect(ctx,HX-9,SP+2,18,24,4);
  ctx.strokeStyle=OL;ctx.lineWidth=2.5;ctx.stroke();ctx.fillStyle=R.b;ctx.fill();
  ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#fff';ctx.beginPath();ctxRoundRect(ctx,HX-5,SP+5,6,10,3);ctx.fill();ctx.restore();

  // front arm
  const[fwx,fwy,felbA]=arm(SX,SY,aF,eF,false);
  // front leg
  leg(-3,HY,lF,kF,false);

  // weapon
  ctx.save();ctx.translate(fwx,fwy);ctx.rotate(-0.1+felbA*0.2);
  if(weapon==='sword'){
    const wCol=lv>=8?'#aaeeff':'#ccccdd';
    ctx.strokeStyle=OL;ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(0,7);ctx.stroke();
    ctx.strokeStyle=wCol;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(0,7);ctx.stroke();
    ctx.strokeStyle=OL;ctx.lineWidth=4;ctx.lineCap='butt';ctx.beginPath();ctx.moveTo(-8,-4);ctx.lineTo(8,-4);ctx.stroke();
    ctx.strokeStyle='#aaaacc';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-8,-4);ctx.lineTo(8,-4);ctx.stroke();
  }else if(weapon==='spear'){
    ctx.strokeStyle=OL;ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-36);ctx.lineTo(0,10);ctx.stroke();
    ctx.strokeStyle='#aa8855';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,-36);ctx.lineTo(0,10);ctx.stroke();
    ctx.fillStyle='#cce0ff';ctx.beginPath();ctx.moveTo(-5,-22);ctx.lineTo(0,-38);ctx.lineTo(5,-22);ctx.closePath();ctx.strokeStyle=OL;ctx.lineWidth=1.5;ctx.stroke();ctx.fill();
  }else if(weapon==='staff'){
    ctx.strokeStyle=OL;ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-32);ctx.lineTo(0,10);ctx.stroke();
    ctx.strokeStyle='#8855aa';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,-32);ctx.lineTo(0,10);ctx.stroke();
    const gp=0.5+0.5*Math.sin(Date.now()/300);
    ctx.fillStyle=`rgba(200,100,255,${0.7+gp*0.3})`;ctx.beginPath();ctx.arc(0,-34,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=OL;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='rgba(255,220,255,0.9)';ctx.beginPath();ctx.arc(-2,-36,3,0,Math.PI*2);ctx.fill();
  }else if(weapon==='axe'){
    ctx.strokeStyle=OL;ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(0,10);ctx.stroke();
    ctx.strokeStyle='#884422';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(0,10);ctx.stroke();
    ctx.fillStyle='#cc4422';ctx.beginPath();ctx.moveTo(-4,-12);ctx.lineTo(-14,-24);ctx.lineTo(-10,-4);ctx.closePath();ctx.strokeStyle=OL;ctx.lineWidth=1.8;ctx.stroke();ctx.fill();
  }else if(weapon==='dagger'){
    ctx.strokeStyle=OL;ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-19);ctx.lineTo(0,6);ctx.stroke();
    ctx.strokeStyle='#55ccaa';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(0,-19);ctx.lineTo(0,6);ctx.stroke();
    ctx.strokeStyle='#aaaacc';ctx.lineWidth=4;ctx.lineCap='butt';ctx.beginPath();ctx.moveTo(-6,-7);ctx.lineTo(6,-3);ctx.stroke();
    ctx.strokeStyle=OL;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-6,-7);ctx.lineTo(6,-3);ctx.stroke();
  }
  ctx.restore();

  // helmet
  ctx.beginPath();ctx.arc(HX,HHY,11,0,Math.PI*2);
  ctx.strokeStyle=OL;ctx.lineWidth=2.8;ctx.stroke();ctx.fillStyle=R.h;ctx.fill();
  ctx.save();ctx.globalAlpha=0.40;ctx.fillStyle=R.hl;
  ctx.beginPath();ctx.ellipse(HX-3,HHY-5,5,4.5,-0.3,0,Math.PI*2);ctx.fill();ctx.restore();
  // brim
  ctx.beginPath();ctxRoundRect(ctx,HX-12,HHY+4,24,6,3);
  ctx.strokeStyle=OL;ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=R.h;ctx.fill();
  // visor
  ctx.fillStyle='#141620';ctx.beginPath();ctxRoundRect(ctx,HX-9,HHY,18,5,1.5);ctx.fill();
  // eyes
  ctx.fillStyle=R.ec;
  ctx.beginPath();ctx.arc(HX-3.5,HHY+2.5,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(HX+3.5,HHY+2.5,1.8,0,Math.PI*2);ctx.fill();
  if(rank==='boss'){
    ctx.save();ctx.globalAlpha=0.25+0.12*Math.sin(t*3);ctx.shadowBlur=10;ctx.shadowColor='#cc00ff';
    ctx.strokeStyle='#cc00ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(HX,HHY,14,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  ctx_.restore();
}

// ── state ─────────────────────────────────────────────────
let currentRank   = 'normal';
let currentWeapon = 'sword';
const RANKS   = ['normal','elite_hp','elite_atk','boss'];
const RANK_LABELS = { normal:'Normal', elite_hp:'Elite HP', elite_atk:'Elite ATK', boss:'Boss' };
const GROUND_Y = 210;

function setRank(r){
  currentRank = r;
  document.querySelectorAll('[id^="b"]').forEach(b=>b.classList.remove('active'));
  const ids = {normal:'bNormal',elite_hp:'bEliteHp',elite_atk:'bEliteAtk',boss:'bBoss'};
  document.getElementById(ids[r]).classList.add('active');
}
function setWeapon(w){
  currentWeapon = w;
  document.querySelectorAll('[id^="w"]').forEach(b=>b.classList.remove('active'));
  const ids = {sword:'wSword',spear:'wSpear',staff:'wStaff',axe:'wAxe',dagger:'wDagger'};
  document.getElementById(ids[w]).classList.add('active');
}

// ── ground ────────────────────────────────────────────────
function drawGround(){
  ctx.strokeStyle='#221640'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(10,GROUND_Y); ctx.lineTo(750,GROUND_Y); ctx.stroke();
}

// ── labels ────────────────────────────────────────────────
function label(text, x, y){
  ctx.fillStyle='rgba(180,160,220,0.7)';
  ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText(text, x, y);
}

// ── loop ──────────────────────────────────────────────────
let t0 = null;
const PREVIEW_SCALE = 2.6;   // ← змінюй тут для зуму

function loop(ts){
  if(!t0) t0 = ts;
  const t = (ts - t0) / 1000;

  ctx.clearRect(0, 0, 760, 260);
  drawGround();

  // Left column: all 4 ranks, current weapon, walking left
  const lxBase = 80;
  for(let i=0;i<RANKS.length;i++){
    const rx = lxBase + i * 170;
    const isActive = RANKS[i] === currentRank;
    if(isActive){
      ctx.save(); ctx.globalAlpha=0.08; ctx.fillStyle='#8866ff';
      ctx.fillRect(rx-55, GROUND_Y-120, 110, 130); ctx.restore();
    }
    drawHero(ctx, rx, GROUND_Y, t, 1, RANKS[i], currentWeapon, 1, PREVIEW_SCALE);
    label(RANK_LABELS[RANKS[i]], rx, GROUND_Y+16);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
