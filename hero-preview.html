<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Рекрут — Pixel RPG Style</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; gap:8px; padding:20px;
  font-family:monospace; color:#998888;
}
canvas { border-radius:14px; display:block; image-rendering:pixelated; }
h2 { font-size:13px; color:#cc9966; letter-spacing:2px; margin-top:4px; }
p  { font-size:10px; letter-spacing:1px; color:#443344; }
</style>
</head>
<body>
<h2>РЕКРУТ · Pixel RPG Style</h2>
<canvas id="c" width="240" height="300"></canvas>
<p>walk cycle · sword · idle animation</p>

<script>
const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');

// ── Palette (pixel RPG style matching reference) ─────────────────
const OL       = '#1a0e00';   // outline
const SKIN     = '#d4956a';   // face/hands
const SKIN_SH  = '#aa6a3e';   // skin shadow
const SKIN_H   = '#e8b88a';   // skin highlight
const HAIR     = '#6b3e20';   // brown hair
const HAIR_H   = '#9a5a2a';   // hair highlight
const HAIR_SH  = '#3e2010';   // hair dark
const SHIRT    = '#e0d4b0';   // cream shirt
const SHIRT_SH = '#b8aa80';   // shirt shadow
const SHIRT_H  = '#f0e8cc';   // shirt highlight
const VEST     = '#3e2810';   // dark brown leather vest
const VEST_H   = '#6a4228';   // vest highlight
const VEST_SH  = '#1e1208';   // vest shadow
const PANTS    = '#5a6872';   // blue-grey pants
const PANTS_SH = '#3a4852';   // pants shadow
const PANTS_H  = '#7a8898';   // pants highlight
const BOOT     = '#221408';   // dark boot
const BOOT_H   = '#3e2818';   // boot highlight
const BELT     = '#2a1808';   // dark belt
const BUCKLE   = '#a07828';   // belt buckle
const BL_EDGE  = '#d8e4e8';   // blade edge
const BL_FLAT  = '#a8b8c0';   // blade flat
const BL_SH    = '#788898';   // blade shadow
const HILT     = '#5a3818';   // sword handle
const HILT_H   = '#8a5828';   // handle highlight
const GUARD    = '#888888';   // crossguard

// ── px: draw a solid colored rectangle (pixel art style) ─────────
function px(x, y, w, h, col) {
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

// ── Line segment ─────────────────────────────────────────────────
function ln(x1, y1, x2, y2, col, lw) {
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = col; ctx.lineWidth = lw;
  ctx.lineCap = 'round'; ctx.stroke();
}

// ── Outlined rect ────────────────────────────────────────────────
function box(x, y, w, h, fill, outline, lw) {
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = outline; ctx.lineWidth = lw;
  ctx.strokeRect(x + lw/2, y + lw/2, w - lw, h - lw);
}

// ── Outlined ellipse ─────────────────────────────────────────────
function ell(cx, cy, rx, ry, fill, outline, lw) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = lw; ctx.stroke();
}

// ── Polygon (points array, [x,y,...]) ────────────────────────────
function poly(pts, fill, outline, lw) {
  ctx.beginPath();
  ctx.moveTo(pts[0], pts[1]);
  for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i+1]);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  if (outline) { ctx.strokeStyle = outline; ctx.lineWidth = lw; ctx.stroke(); }
}

// ── Capsule (limb) ───────────────────────────────────────────────
function cap(x1,y1,x2,y2,r,fill,outline,lw) {
  const a = Math.atan2(y2-y1, x2-x1);
  ctx.beginPath();
  ctx.arc(x1, y1, r, a+Math.PI/2, a-Math.PI/2);
  ctx.arc(x2, y2, r, a-Math.PI/2, a+Math.PI/2);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = lw; ctx.stroke();
}

// ── RECRUIT ──────────────────────────────────────────────────────
// Pixel RPG style: cream shirt, brown leather vest, grey pants, dark boots
// No armor, no helmet — simple adventurer look like the reference image
function drawRecruit(x, y, t, dir, sc) {
  dir = dir || 1; sc = sc || 1;
  const lw = Math.max(1, 1.8 * sc);

  // ── Walk cycle ────────────────────────────────────────────────
  const spd = 2.0;
  const wc  = Math.sin(t * spd);
  const wcc = Math.cos(t * spd);
  const bob = (1 - Math.abs(wc)) * 2.5 * sc;

  const legSwing =  wc * 24;          // degrees
  const legBack  = -wc * 24;
  const kneeF    = Math.max(0,  wcc) * 18;
  const kneeB    = Math.max(0, -wcc) * 18;
  const armSwing = -wc * 18;
  const armBack  =  wc * 18;

  // Sword arm stays mostly down, slight idle sway
  const swordSway = Math.sin(t * 1.5) * 6;

  ctx.save();
  ctx.translate(x, y - bob);
  ctx.scale(dir * sc, sc);
  // Origin: ground (feet); y negative = upward

  const G = 0; // ground y in local

  // ── Helper: draw a leg segment ─────────────────────────────
  // thighAngle: swing angle, kneeAngle: extra shin angle
  function drawLeg(thighAngle, kneeAngle, isFront) {
    const hipY = -72;
    const thighLen = 34;
    const shinLen  = 30;
    const thR = 9;
    const shR = 8;

    ctx.save();
    ctx.translate(0, hipY);
    ctx.rotate(thighAngle * Math.PI/180);

    // Thigh (pants)
    cap(0, 0, 0, thighLen, thR, PANTS, OL, lw);
    // Highlight left side of thigh
    ctx.save(); ctx.globalAlpha = 0.18;
    cap(-thR*0.3, 2, -thR*0.3, thighLen-2, thR*0.45, '#fff', null, 0);
    ctx.restore();

    ctx.save();
    ctx.translate(0, thighLen);
    ctx.rotate(kneeAngle * Math.PI/180);

    // Shin (pants, slightly darker)
    cap(0, 0, 0, shinLen, shR, PANTS_SH, OL, lw);

    // Boot
    ctx.save();
    ctx.translate(0, shinLen);
    // Boot upper (tube)
    cap(0, -4, 0, 8, shR+1, BOOT, OL, lw);
    // Boot toe — rectangular pixel style pointing forward
    poly([
      -shR-1, 4,
      shR*2.2+4, 4,
      shR*2.2+4, 14,
      -shR-1, 14
    ], BOOT, OL, lw);
    // Toe round tip
    ctx.beginPath();
    ctx.arc(shR*2.2+2, 9, 6, 0, Math.PI*2);
    ctx.fillStyle = BOOT; ctx.fill();
    ctx.strokeStyle = OL; ctx.lineWidth = lw; ctx.stroke();
    // Boot highlight
    ctx.save(); ctx.globalAlpha = 0.22;
    ln(-shR+1, 2, shR*1.5, 2, '#fff', 2*sc);
    ctx.restore();
    ctx.restore(); // boot

    ctx.restore(); // shin
    ctx.restore(); // thigh
  }

  // ── BACK LEG ───────────────────────────────────────────────
  drawLeg(legBack, kneeB, false);

  // ── BACK ARM ────────────────────────────────────────────────
  {
    const shoulderX = -15, shoulderY = -110;
    ctx.save();
    ctx.translate(shoulderX, shoulderY);
    ctx.rotate(armBack * Math.PI/180);
    // Upper arm (shirt sleeve)
    cap(0, 0, -1, 26, 9, SHIRT, OL, lw);
    // Forearm (shirt)
    cap(-1, 26, -2, 48, 8, SHIRT_SH, OL, lw);
    // Hand
    ell(-2, 54, 7, 6, SKIN, OL, lw*0.8);
    ctx.restore();
  }

  // ── TORSO ──────────────────────────────────────────────────
  // Shirt (visible at sides and bottom)
  poly([
    -22, G-72,
    -24, G-112,
    -20, G-126,
     20, G-126,
     24, G-112,
     22, G-72
  ], SHIRT, OL, lw);
  // Shirt highlight (left side)
  ctx.save(); ctx.globalAlpha = 0.22;
  poly([-22, G-72, -24, G-112, -16, G-118, -14, G-78], SHIRT_H, null, 0);
  ctx.restore();
  // Shirt collar V-neck
  poly([0, G-120, -10, G-112, 0, G-108, 10, G-112], SHIRT_SH, OL, lw*0.7);

  // Leather vest (dark, over shirt)
  // Left side of vest
  poly([
    -22, G-72,
    -24, G-112,
    -20, G-126,
    -3,  G-126,
    -3,  G-72
  ], VEST, OL, lw);
  ctx.save(); ctx.globalAlpha = 0.3;
  poly([-22, G-72, -24, G-112, -18, G-118, -16, G-76], VEST_H, null, 0);
  ctx.restore();

  // Right side of vest
  poly([
     22, G-72,
     24, G-112,
     20, G-126,
      3, G-126,
      3, G-72
  ], VEST, OL, lw);
  // Vest right highlight
  ctx.save(); ctx.globalAlpha = 0.15;
  poly([22, G-72, 24, G-112, 18, G-118, 16, G-76], '#fff', null, 0);
  ctx.restore();

  // Belt
  poly([-23, G-74, 23, G-74, 23, G-66, -23, G-66], BELT, OL, lw*0.9);
  // Buckle
  ell(0, G-70, 8, 5, BUCKLE, OL, lw*0.8);
  // Belt stitch line
  ctx.save(); ctx.globalAlpha = 0.35;
  ln(-20, G-70, -10, G-70, '#fff', sc);
  ln(10, G-70, 20, G-70, '#fff', sc);
  ctx.restore();

  // Shirt collar / neckline
  ctx.save(); ctx.globalAlpha = 0.7;
  ln(-8, G-124, 0, G-114, SHIRT_SH, lw*0.9);
  ln(8, G-124, 0, G-114, SHIRT_SH, lw*0.9);
  ctx.restore();

  // ── SWORD ARM (right / front) ─────────────────────────────
  {
    const shoulderX = 17, shoulderY = -112;
    ctx.save();
    ctx.translate(shoulderX, shoulderY);
    ctx.rotate((armSwing + swordSway) * Math.PI/180);

    // Upper arm
    cap(0, 0, 2, 26, 9, SHIRT, OL, lw);
    // Forearm
    cap(2, 26, 4, 48, 8, SHIRT_SH, OL, lw);
    // Fist / hand holding sword
    ell(5, 54, 8, 7, SKIN, OL, lw);

    // ── SWORD ─────────────────────────────────────────────
    ctx.save();
    ctx.translate(5, 56);
    ctx.rotate(0.35); // angled down-forward like reference

    // Handle / grip
    cap(0, 0, 0, 20, 3.5, HILT, OL, lw*0.8);
    // Handle wrapping straps
    ctx.save(); ctx.globalAlpha = 0.5;
    for (let g = 3; g < 20; g += 5) {
      ln(-3.5, g, 3.5, g, HILT_H, sc);
    }
    ctx.restore();
    // Pommel (round)
    ell(0, 23, 5.5, 4.5, GUARD, OL, lw*0.7);

    // Crossguard (simple bar)
    poly([-12, -2.5, 12, -2.5, 12, 3.5, -12, 3.5], GUARD, OL, lw*0.8);
    // Crossguard highlight
    ctx.save(); ctx.globalAlpha = 0.3;
    ln(-10, -1, 10, -1, '#fff', sc);
    ctx.restore();

    // Blade (shorter, wider — more like a short sword / seax from reference)
    poly([
      -5.5, -4,
       5.5, -4,
       3,   -52,
       0,   -62,
      -3,   -52
    ], BL_FLAT, OL, lw*0.75);
    // Blade left edge highlight
    ctx.save(); ctx.globalAlpha = 0.55;
    ln(-4, -4, -2, -55, BL_EDGE, 2*sc);
    ctx.restore();
    // Blade fuller groove
    ctx.save(); ctx.globalAlpha = 0.5;
    ln(0, -5, 0, -50, BL_SH, sc);
    ctx.restore();
    // Blade right shadow
    ctx.save(); ctx.globalAlpha = 0.28;
    poly([2, -4, 5.5, -4, 2.5, -52, 0, -60], BL_SH, null, 0);
    ctx.restore();

    ctx.restore(); // sword
    ctx.restore(); // sword arm
  }

  // ── FRONT LEG ─────────────────────────────────────────────
  drawLeg(legSwing, kneeF, true);

  // ── NECK ──────────────────────────────────────────────────
  poly([-7, G-122, 7, G-122, 6, G-136, -6, G-136], SKIN, OL, lw*0.9);

  // ── HEAD ──────────────────────────────────────────────────
  // Head shape — slightly rectangular pixel art style
  const hx = 1, hy = G-162;
  const hw = 22, hh = 26;
  ell(hx, hy, hw, hh, SKIN, OL, lw);
  // Face shadow (right side)
  ctx.save(); ctx.globalAlpha = 0.18;
  ell(hx+8, hy+2, hw*0.5, hh*0.7, SKIN_SH, null, 0);
  ctx.restore();
  // Face highlight (left side)
  ctx.save(); ctx.globalAlpha = 0.22;
  ell(hx-8, hy-6, hw*0.4, hh*0.45, '#fff', null, 0);
  ctx.restore();

  // ── HAIR ──────────────────────────────────────────────────
  // Top of hair
  ctx.beginPath();
  ctx.moveTo(hx-22, hy-4);
  ctx.bezierCurveTo(hx-24, hy-38, hx+24, hy-38, hx+22, hy-4);
  ctx.bezierCurveTo(hx+18, hy-12, hx-18, hy-12, hx-22, hy-4);
  ctx.closePath();
  ctx.fillStyle = HAIR; ctx.fill();
  ctx.strokeStyle = OL; ctx.lineWidth = lw; ctx.stroke();

  // Hair highlight
  ctx.save(); ctx.globalAlpha = 0.32;
  ctx.beginPath();
  ctx.moveTo(hx-10, hy-30);
  ctx.bezierCurveTo(hx-6, hy-38, hx+8, hy-36, hx+12, hy-28);
  ctx.bezierCurveTo(hx+6, hy-34, hx-4, hy-34, hx-10, hy-30);
  ctx.closePath();
  ctx.fillStyle = HAIR_H; ctx.fill();
  ctx.restore();

  // Side hair (hangs down beside ears)
  ctx.save();
  // Left sideburn
  ctx.beginPath();
  ctx.moveTo(hx-20, hy-8);
  ctx.bezierCurveTo(hx-28, hy-2, hx-28, hy+14, hx-22, hy+18);
  ctx.bezierCurveTo(hx-18, hy+12, hx-20, hy+2, hx-18, hy-4);
  ctx.closePath();
  ctx.fillStyle = HAIR; ctx.fill();
  ctx.strokeStyle = OL; ctx.lineWidth = lw*0.8; ctx.stroke();
  // Right sideburn
  ctx.beginPath();
  ctx.moveTo(hx+20, hy-8);
  ctx.bezierCurveTo(hx+28, hy-2, hx+28, hy+14, hx+22, hy+18);
  ctx.bezierCurveTo(hx+18, hy+12, hx+20, hy+2, hx+18, hy-4);
  ctx.closePath();
  ctx.fillStyle = HAIR; ctx.fill();
  ctx.strokeStyle = OL; ctx.lineWidth = lw*0.8; ctx.stroke();
  ctx.restore();

  // ── FACE ──────────────────────────────────────────────────
  // Eyes — pixel RPG style, simple and readable
  function eye(ex, ey) {
    // White
    ell(ex, ey, 5.5, 6, '#f0e8d8', OL, lw*0.7);
    // Iris (brown)
    ell(ex+0.5, ey+0.5, 3.5, 4.5, '#6b4020', null, 0);
    // Pupil
    ell(ex+0.5, ey+0.5, 2, 2.8, '#1a0800', null, 0);
    // Shine
    ell(ex-1, ey-1.5, 1.3, 1.6, '#ffffff', null, 0);
  }
  eye(hx-10, hy-4);
  eye(hx+10, hy-4);

  // Eyebrows (simple, straight — pixel RPG)
  ctx.save(); ctx.lineCap = 'round'; ctx.lineWidth = 2.8*sc;
  ctx.strokeStyle = HAIR_SH;
  ctx.beginPath(); ctx.moveTo(hx-16, hy-16); ctx.lineTo(hx-5, hy-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+5, hy-14); ctx.lineTo(hx+16, hy-16); ctx.stroke();
  ctx.restore();

  // Nose (simple, two dots / bump like pixel art)
  ctx.save(); ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.arc(hx+3, hy+6, 2.5, 0, Math.PI);
  ctx.strokeStyle = SKIN_SH; ctx.lineWidth = 2*sc; ctx.stroke();
  ctx.restore();

  // Mouth (neutral / slight smirk)
  ctx.beginPath();
  ctx.moveTo(hx-7, hy+16);
  ctx.bezierCurveTo(hx-3, hy+20, hx+5, hy+20, hx+9, hy+16);
  ctx.strokeStyle = '#8b4020'; ctx.lineWidth = 2.2*sc;
  ctx.lineCap = 'round'; ctx.stroke();

  // Chin stubble hint (very subtle)
  ctx.save(); ctx.globalAlpha = 0.12;
  ell(hx, hy+20, 10, 5, HAIR, null, 0);
  ctx.restore();

  // ── IDLE SWORD GLINT (subtle) ───────────────────────────────
  const glint = 0.3 + 0.7 * Math.abs(Math.sin(t * 2.8));
  ctx.save();
  ctx.globalAlpha = glint * 0.25;
  ctx.shadowColor = '#d8e8ff';
  ctx.shadowBlur  = 8 * sc;
  ctx.beginPath();
  // Position relative to sword arm's extended position
  ctx.arc(30, -85, 3*sc, 0, Math.PI*2);
  ctx.fillStyle = '#e8f4ff'; ctx.fill();
  ctx.restore();

  ctx.restore(); // main transform
}

// ── RENDER LOOP ────────────────────────────────────────────────
const CW = cvs.width, CH = cvs.height;

// SC=0.7 → character ~140px tall on 300px canvas
const SC = 0.7;
const GX = CW / 2;
const GY = Math.round(CH * 0.80);

let t0 = null;
function frame(ts) {
  if (!t0) t0 = ts;
  const t = (ts - t0) / 1000;

  ctx.clearRect(0, 0, CW, CH);

  // Dark dungeon background
  ctx.fillStyle = '#12111a';
  ctx.fillRect(0, 0, CW, CH);

  // Stone floor
  ctx.fillStyle = '#1e1c28';
  ctx.fillRect(0, GY + 2, CW, CH - GY - 2);
  ctx.fillStyle = '#28263a';
  for (let tx = 0; tx < CW; tx += 32) {
    ctx.fillRect(tx, GY + 2, 31, 18);
    ctx.fillRect(tx + 16, GY + 22, 31, 18);
  }
  ctx.fillStyle = '#3a3850';
  ctx.fillRect(0, GY, CW, 2);

  // Shadow under feet
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.ellipse(GX, GY + 4, 18 * SC, 5 * SC, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  drawRecruit(GX, GY, t, 1, SC);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
