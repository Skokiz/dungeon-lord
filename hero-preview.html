<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Рекрут — Mobile RPG Style</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d0b1a;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; gap:8px; padding:20px;
  font-family:monospace; color:#998888;
}
canvas { border-radius:14px; display:block; }
h2 { font-size:13px; color:#cc9966; letter-spacing:2px; margin-top:4px; }
p  { font-size:10px; letter-spacing:1px; color:#443344; }
</style>
</head>
<body>
<h2>РЕКРУТ · Mobile RPG Style · Medieval Fantasy</h2>
<canvas id="c" width="700" height="460"></canvas>
<p>walk cycle · magic sword · rune glow</p>

<script>
const cvs = document.getElementById('c');
const ctx  = cvs.getContext('2d');

// ── Palette ────────────────────────────────────────────────────
const OL       = '#181008'; // outline
const SKIN     = '#e8b87a';
const SKIN_SH  = '#c49050';
const IRON     = '#8898a8';
const IRON_H   = '#ccdde8';
const IRON_SH  = '#506070';
const RED      = '#c43030';
const RED_SH   = '#801818';
const RED_H    = '#e04040';
const LTHR     = '#8b5e3c';
const LTHR_SH  = '#5a3520';
const LTHR_H   = '#b07a50';
const STEEL    = '#b8c8d0';
const STEEL_H  = '#e8f4f8';
const GOLD     = '#c8a030';
const DARK     = '#2a1810';

// ── Core helpers ───────────────────────────────────────────────
function fs(fill, lw) {
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = OL; ctx.lineWidth = lw; ctx.stroke();
}

// Capsule limb (from p1 to p2, radius r)
function cap(x1,y1,x2,y2,r,fill,lw) {
  const a = Math.atan2(y2-y1, x2-x1);
  ctx.beginPath();
  ctx.arc(x1, y1, r, a+Math.PI/2, a-Math.PI/2);
  ctx.arc(x2, y2, r, a-Math.PI/2, a+Math.PI/2);
  ctx.closePath();
  fs(fill, lw);
  // highlight strip on top-left
  const px = -Math.sin(a)*r*0.42, py = Math.cos(a)*r*0.42;
  ctx.save(); ctx.globalAlpha = 0.22;
  ctx.beginPath();
  ctx.arc(x1+px, y1+py, r*0.28, a+Math.PI/2, a-Math.PI/2);
  ctx.arc(x2+px, y2+py, r*0.28, a-Math.PI/2, a+Math.PI/2);
  ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
}

// ── RECRUIT ────────────────────────────────────────────────────
// x, y = ground position (boots touch here)
// t = time (s), dir = 1 right / -1 left, sc = scale
function drawRecruit(x, y, t, dir, sc) {
  dir = dir || 1; sc = sc || 1;
  const lw = 2.4 * sc;

  // Walk cycle
  const spd = 2.2;
  const wc  = Math.sin(t * spd);
  const wcc = Math.cos(t * spd);
  const bob = (1 - Math.abs(wc)) * 3.5;

  // Leg swing angles (deg)
  const legF =  wc * 26;
  const legB = -wc * 26;
  // Knee bend (bend opposite leg when swinging)
  const kF   = Math.max(0,  wcc) * 20;
  const kB   = Math.max(0, -wcc) * 20;
  // Arms opposite to legs
  const armF = -wc * 22;
  const armB =  wc * 22;

  ctx.save();
  ctx.translate(x, y - bob * sc);
  ctx.scale(dir * sc, sc);
  // Local coords: origin = ground (boot level), y<0 = up

  function C(x1,y1,x2,y2,r,fill) { cap(x1,y1,x2,y2,r,fill,lw); }

  // ── Draw one leg (rotated from hip) ─────────────────────────
  // angle: swing angle (deg), knee: shin extra angle (deg)
  function drawLeg(angle, knee, thR, shR) {
    const hipY = -72; // hip above ground (local)
    ctx.save();
    ctx.translate(0, hipY);
    ctx.rotate(angle * Math.PI/180);

    // Thigh
    C(0, 0, 0, 32, thR, LTHR);
    // Knee guard
    ctx.beginPath(); ctx.arc(0, 32, thR*0.75, 0, Math.PI*2);
    fs(IRON, lw*0.75);

    ctx.save();
    ctx.translate(0, 32);
    ctx.rotate(knee * Math.PI/180);
    // Shin
    C(0, 0, 0, 28, shR, LTHR_SH);

    // Boot (at ankle)
    ctx.save();
    ctx.translate(0, 28);
    // Boot body
    ctx.beginPath();
    ctx.moveTo(-shR-1, 0);
    ctx.bezierCurveTo(-shR-1, 14, shR*2+8, 16, shR*2+10, 10);
    ctx.bezierCurveTo(shR*2+10, 4, shR+2, 0, shR+1, 0);
    ctx.closePath();
    fs(DARK, lw*0.85);
    // Boot toe iron cap
    ctx.beginPath();
    ctx.ellipse(shR*1.6+7, 9, 8, 6, 0, 0, Math.PI*2);
    fs(IRON_SH, lw*0.7);
    // Highlight on boot
    ctx.save(); ctx.globalAlpha = 0.22;
    ctx.beginPath();
    ctx.ellipse(2, 4, shR, 4, 0, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();
    ctx.restore(); // boot
    ctx.restore(); // shin
    ctx.restore(); // leg
  }

  // ── BACK LEG ───────────────────────────────────────────────
  drawLeg(legB, kB, 11, 9);

  // ── BACK ARM ───────────────────────────────────────────────
  ctx.save();
  ctx.translate(-18, -115); // left shoulder
  ctx.rotate(armB * Math.PI/180);
  C(0, 0, -3, 24, 9, IRON);    // upper arm (armored)
  C(-3, 24, -4, 44, 8, SKIN);  // forearm
  ctx.beginPath(); ctx.arc(-4, 50, 8, 0, Math.PI*2); fs(SKIN, lw*0.8);
  ctx.restore();

  // ── TORSO ──────────────────────────────────────────────────
  // Red tabard
  ctx.beginPath();
  ctx.moveTo(-21, -72);
  ctx.bezierCurveTo(-24, -85, -26, -112, -22, -122);
  ctx.bezierCurveTo(-18, -130, 18, -130, 22, -122);
  ctx.bezierCurveTo(26, -112, 24, -85, 21, -72);
  ctx.bezierCurveTo(20, -66, -20, -66, -21, -72);
  ctx.closePath();
  fs(RED, lw);
  // Shadow side of tabard
  ctx.save(); ctx.globalAlpha = 0.22;
  ctx.beginPath();
  ctx.moveTo(10, -72); ctx.bezierCurveTo(18, -82, 18, -118, 14, -126);
  ctx.bezierCurveTo(18, -130, 22, -122, 22, -122);
  ctx.bezierCurveTo(26, -112, 24, -85, 21, -72);
  ctx.closePath();
  ctx.fillStyle = RED_SH; ctx.fill();
  ctx.restore();

  // Iron breastplate
  ctx.beginPath();
  ctx.moveTo(-14, -74);
  ctx.bezierCurveTo(-16, -88, -16, -114, -12, -122);
  ctx.bezierCurveTo(-8, -128, 8, -128, 12, -122);
  ctx.bezierCurveTo(16, -114, 16, -88, 14, -74);
  ctx.bezierCurveTo(12, -70, -12, -70, -14, -74);
  ctx.closePath();
  fs(IRON, lw);
  // Breastplate highlight
  ctx.save(); ctx.globalAlpha = 0.32;
  ctx.beginPath();
  ctx.moveTo(-7, -78);
  ctx.bezierCurveTo(-8, -104, -5, -120, -2, -124);
  ctx.bezierCurveTo(2, -127, 7, -118, 8, -94);
  ctx.bezierCurveTo(8, -84, -2, -76, -7, -78);
  ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
  // Breastplate center ridge
  ctx.beginPath();
  ctx.moveTo(0, -74); ctx.lineTo(0, -120);
  ctx.strokeStyle = IRON_SH; ctx.lineWidth = 1.6*sc; ctx.stroke();

  // Belt
  ctx.beginPath(); ctx.rect(-22, -76, 44, 10);
  fs(LTHR, lw*0.9);
  // Buckle
  ctx.beginPath(); ctx.rect(-6, -75, 12, 8); fs(GOLD, 1.5*sc);
  ctx.beginPath(); ctx.rect(-3, -73, 6, 4);
  ctx.fillStyle = LTHR; ctx.fill();

  // Left pauldron
  ctx.save(); ctx.translate(-22, -122);
  ctx.beginPath(); ctx.ellipse(0, 0, 15, 9, -0.2, 0, Math.PI*2);
  fs(IRON, lw);
  ctx.beginPath(); ctx.moveTo(-13, 3); ctx.lineTo(11, 3);
  ctx.strokeStyle = IRON_SH; ctx.lineWidth = 1.3*sc; ctx.stroke();
  ctx.restore();

  // ── SWORD ARM (right / front) ───────────────────────────────
  ctx.save();
  ctx.translate(20, -122); // right shoulder
  ctx.rotate(armF * Math.PI/180);

  // Right pauldron
  ctx.beginPath(); ctx.ellipse(0, 0, 15, 9, 0.2, 0, Math.PI*2);
  fs(IRON, lw);
  ctx.beginPath(); ctx.moveTo(-11, 3); ctx.lineTo(13, 3);
  ctx.strokeStyle = IRON_SH; ctx.lineWidth = 1.3*sc; ctx.stroke();

  // Upper arm
  C(0, 0, 4, 24, 9, IRON);
  // Bracer (forearm, iron-clad)
  C(4, 24, 6, 46, 8, IRON);
  // Fist
  ctx.beginPath(); ctx.arc(7, 53, 9, 0, Math.PI*2); fs(SKIN, lw*0.85);

  // ── SWORD ────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(7, 53);
  ctx.rotate(-0.22); // slight forward tilt

  // Grip (leather-wrapped)
  ctx.beginPath(); ctx.rect(-3.5, 2, 7, 22); fs(LTHR, 1.6*sc);
  for (let g = 5; g < 22; g += 5) {
    ctx.beginPath(); ctx.moveTo(-3.5, 2+g); ctx.lineTo(3.5, 2+g);
    ctx.strokeStyle = LTHR_SH; ctx.lineWidth = 1.6*sc; ctx.stroke();
  }
  // Pommel
  ctx.beginPath(); ctx.ellipse(0, 25, 6.5, 5.5, 0, 0, Math.PI*2);
  fs(IRON, 1.5*sc);

  // Crossguard (wider, slight curve)
  ctx.beginPath();
  ctx.moveTo(-15, -3);
  ctx.bezierCurveTo(-15, -8, 15, -8, 15, -3);
  ctx.bezierCurveTo(15, 3, -15, 3, -15, -3);
  ctx.closePath();
  fs(IRON, lw*0.9);
  // Crossguard highlight
  ctx.save(); ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.moveTo(-12, -4); ctx.bezierCurveTo(-12, -7, 12, -7, 12, -4);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*sc; ctx.stroke();
  ctx.restore();

  // Blade — drawn twice: glow layer + solid
  const bladeGlow = 0.45 + 0.55 * Math.sin(t * 3.2);
  ctx.save();
  ctx.shadowColor = '#8888ff';
  ctx.shadowBlur  = 20 * sc * bladeGlow;
  ctx.globalAlpha = bladeGlow;
  ctx.beginPath();
  ctx.moveTo(-5, -5);
  ctx.lineTo(-3, -54); ctx.lineTo(0, -68); ctx.lineTo(3, -54); ctx.lineTo(5, -5);
  ctx.closePath();
  ctx.fillStyle = STEEL_H; ctx.fill();
  ctx.restore();
  // Blade solid
  ctx.beginPath();
  ctx.moveTo(-5, -5);
  ctx.lineTo(-3, -54); ctx.lineTo(0, -68); ctx.lineTo(3, -54); ctx.lineTo(5, -5);
  ctx.closePath();
  fs(STEEL, lw*0.8);
  // Fuller groove
  ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(0, -58);
  ctx.strokeStyle = '#8898a8'; ctx.lineWidth = sc; ctx.stroke();
  // Edge highlight
  ctx.save(); ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.moveTo(-3, -6); ctx.lineTo(-2, -54); ctx.lineTo(0, -66);
  ctx.strokeStyle = STEEL_H; ctx.lineWidth = 1.5*sc; ctx.lineCap = 'round'; ctx.stroke();
  ctx.restore();

  ctx.restore(); // sword local
  ctx.restore(); // sword arm

  // ── FRONT LEG ─────────────────────────────────────────────
  drawLeg(legF, kF, 12, 10);

  // ── NECK ──────────────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(-7, -122); ctx.lineTo(-6, -134);
  ctx.lineTo(6, -134); ctx.lineTo(7, -122);
  ctx.closePath();
  fs(SKIN, lw*0.9);
  // Chainmail coif ring
  ctx.beginPath(); ctx.ellipse(0, -128, 20, 13, 0, 0, Math.PI*2);
  fs(IRON_SH, lw*0.8);

  // ── HEAD ──────────────────────────────────────────────────
  ctx.beginPath();
  ctx.ellipse(2, -154, 23, 25, 0, 0, Math.PI*2);
  fs(SKIN, lw);
  // Subtle shadow side
  ctx.save(); ctx.globalAlpha = 0.18;
  ctx.beginPath(); ctx.ellipse(10, -154, 13, 20, 0.2, 0, Math.PI*2);
  ctx.fillStyle = SKIN_SH; ctx.fill();
  ctx.restore();

  // ── HELMET ────────────────────────────────────────────────
  // Bowl
  ctx.beginPath();
  ctx.moveTo(-23, -160);
  ctx.bezierCurveTo(-24, -200, 25, -200, 26, -160);
  ctx.lineTo(22, -152);
  ctx.bezierCurveTo(20, -146, -20, -146, -22, -152);
  ctx.closePath();
  fs(IRON, lw);
  // Highlight patch
  ctx.save(); ctx.globalAlpha = 0.38;
  ctx.beginPath();
  ctx.moveTo(-10, -163);
  ctx.bezierCurveTo(-9, -196, 15, -193, 16, -163);
  ctx.lineTo(12, -158);
  ctx.bezierCurveTo(8, -155, -6, -157, -10, -163);
  ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();
  // Brim band
  ctx.beginPath();
  ctx.moveTo(-23, -160);
  ctx.bezierCurveTo(-20, -150, 20, -150, 26, -160);
  ctx.bezierCurveTo(20, -154, -20, -154, -23, -160);
  ctx.closePath();
  fs(IRON_SH, 1.5*sc);
  // Nasal guard
  ctx.beginPath();
  ctx.moveTo(-3, -152); ctx.lineTo(-3, -135);
  ctx.lineTo(3, -135); ctx.lineTo(3, -152);
  ctx.closePath();
  fs(IRON_SH, 1.5*sc);
  // Cheek guards (small plates)
  ctx.save(); ctx.translate(-22, -155);
  ctx.beginPath(); ctx.ellipse(0, 6, 6, 9, -0.1, 0, Math.PI*2); fs(IRON_SH, 1.2*sc);
  ctx.restore();
  ctx.save(); ctx.translate(23, -155);
  ctx.beginPath(); ctx.ellipse(0, 6, 6, 9, 0.1, 0, Math.PI*2); fs(IRON_SH, 1.2*sc);
  ctx.restore();

  // ── FACE ──────────────────────────────────────────────────
  function eye(ex, ey) {
    // White
    ctx.beginPath(); ctx.ellipse(ex, ey, 6.5, 7.5, 0, 0, Math.PI*2);
    fs('#fff', 1.5*sc);
    // Iris
    ctx.beginPath(); ctx.ellipse(ex+0.5, ey+0.5, 4.5, 5.5, 0, 0, Math.PI*2);
    ctx.fillStyle = '#7b5030'; ctx.fill();
    // Pupil
    ctx.beginPath(); ctx.ellipse(ex+0.5, ey+0.5, 2.8, 3.5, 0, 0, Math.PI*2);
    ctx.fillStyle = '#180a00'; ctx.fill();
    // Shine
    ctx.beginPath(); ctx.ellipse(ex-1, ey-1, 1.5, 2, 0, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  }
  eye(-12, -149);
  eye(12, -149);

  // Eyebrows (furrowed for determined look)
  ctx.save(); ctx.lineCap = 'round'; ctx.lineWidth = 3.3*sc;
  ctx.strokeStyle = '#5a3018';
  ctx.beginPath(); ctx.moveTo(-19, -163); ctx.lineTo(-7, -160); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7, -160); ctx.lineTo(19, -163); ctx.stroke();
  ctx.restore();

  // Nose
  ctx.beginPath(); ctx.arc(2, -138, 3.5, 0, Math.PI);
  ctx.strokeStyle = SKIN_SH; ctx.lineWidth = 2*sc; ctx.stroke();

  // Mouth (slight confident smile)
  ctx.beginPath();
  ctx.moveTo(-9, -128); ctx.bezierCurveTo(-4, -124, 6, -124, 10, -128);
  ctx.strokeStyle = '#9b4428'; ctx.lineWidth = 2.6*sc;
  ctx.lineCap = 'round'; ctx.stroke();

  // Blush
  ctx.save(); ctx.globalAlpha = 0.2;
  ctx.beginPath(); ctx.ellipse(-17, -133, 10, 5.5, -0.15, 0, Math.PI*2);
  ctx.fillStyle = '#ff7777'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(19, -133, 10, 5.5, 0.15, 0, Math.PI*2);
  ctx.fillStyle = '#ff7777'; ctx.fill();
  ctx.restore();

  // ── FLOATING RUNE ──────────────────────────────────────────
  const runeY = -215 + Math.sin(t * 2.3) * 10;
  const runeA = 0.5 + 0.5 * Math.sin(t * 4.5);
  ctx.save();
  ctx.globalAlpha = runeA;
  ctx.shadowColor = '#8888ff';
  ctx.shadowBlur  = 14 * sc;
  ctx.fillStyle   = '#aaaaff';
  ctx.font        = `bold ${18*sc}px serif`;
  ctx.textAlign   = 'center';
  ctx.fillText('ᚱ', 26, runeY);
  ctx.restore();

  ctx.restore(); // main transform
}

// ── RENDER LOOP ────────────────────────────────────────────────
let t0 = null;
function frame(ts) {
  if (!t0) t0 = ts;
  const t = (ts - t0) / 1000;

  ctx.clearRect(0, 0, cvs.width, cvs.height);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, cvs.height);
  bg.addColorStop(0, '#1c1630');
  bg.addColorStop(1, '#0c0a18');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, cvs.width, cvs.height);

  // Stone-floor grid hint
  ctx.strokeStyle = '#2c2048'; ctx.lineWidth = 1;
  const GY = Math.round(cvs.height * 0.9); // ground y
  for (let gx = 0; gx < cvs.width; gx += 80) {
    ctx.beginPath();
    ctx.moveTo(gx,    GY);
    ctx.lineTo(gx+40, GY + 8);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(0, GY); ctx.lineTo(cvs.width, GY);
  ctx.strokeStyle = '#3a2860'; ctx.lineWidth = 1.5; ctx.stroke();

  // Labels
  ctx.fillStyle = '#554466'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
  ctx.fillText('→ right', 160, GY + 28);
  ctx.fillText('← left',  460, GY + 28);
  ctx.fillText('game ×0.72', 620, GY + 28);

  const SC = 2.0;
  drawRecruit(160, GY, t,           1,  SC);
  drawRecruit(460, GY, t + 0.72,   -1,  SC);
  drawRecruit(620, GY, t,            1,  0.72);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
